<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MJ Live — Producer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
    h1 { font-size: 1.2rem; letter-spacing: 0.2em; color: #888; }

    #controls { display: flex; gap: 12px; align-items: center; }
    button { background: #c9a84c; color: #000; border: none; padding: 12px 32px; font-size: 0.9rem; font-family: monospace; letter-spacing: 0.1em; cursor: pointer; }
    button:disabled { background: #333; color: #666; cursor: default; }
    button#stop-btn { background: #555; color: #fff; }
    button#stop-btn:hover:not(:disabled) { background: #888; }

    #seek-row { display: flex; align-items: center; gap: 12px; }
    #seek { width: 320px; accent-color: #c9a84c; cursor: pointer; }
    #time { font-size: 0.8rem; color: #888; min-width: 90px; }

    #status { font-size: 0.8rem; color: #555; }
    .ok { color: #4caf50; }
    .err { color: #f44336; }

    #pcm-status { font-size: 0.75rem; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>MJ LIVE — PRODUCER</h1>

  <div id="controls">
    <button id="play-btn">PLAY</button>
    <button id="stop-btn" disabled>STOP</button>
  </div>

  <div id="seek-row">
    <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
    <span id="time">0:00 / 0:00</span>
  </div>

  <div id="status">Bridge: <span id="bridge-status">connecting...</span></div>
  <div id="pcm-status">PCM16: <span id="pcm-indicator">idle</span></div>

  <audio id="audio" src="/audio-file" preload="auto" crossorigin="anonymous"></audio>

  <script>
    const BRIDGE_WS = 'ws://localhost:3001?role=producer';
    const BRIDGE_HTTP = 'http://localhost:3001';
    const EQ_BARS = 32;
    let audioCtx, analyser, source, workletNode;
    let playing = false;
    let rafId = null;
    let pcmChunksSent = 0;
    let producerWs = null;

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const seekEl = document.getElementById('seek');
    const timeEl = document.getElementById('time');
    const pcmEl = document.getElementById('pcm-indicator');

    // --- Producer WebSocket (replaces HTTP POST for audio + EQ) ---
    function connectProducerWs() {
      producerWs = new WebSocket(BRIDGE_WS);
      producerWs.binaryType = 'arraybuffer';

      producerWs.onopen = () => {
        document.getElementById('bridge-status').textContent = 'connected (ws)';
        document.getElementById('bridge-status').className = 'ok';
      };
      producerWs.onclose = () => {
        document.getElementById('bridge-status').textContent = 'reconnecting...';
        document.getElementById('bridge-status').className = 'err';
        setTimeout(connectProducerWs, 2000);
      };
      producerWs.onerror = () => {
        document.getElementById('bridge-status').textContent = 'ws error';
        document.getElementById('bridge-status').className = 'err';
      };
    }
    connectProducerWs();

    // --- Time display ---
    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    audio.addEventListener('loadedmetadata', () => {
      seekEl.max = audio.duration;
      timeEl.textContent = `0:00 / ${fmt(audio.duration)}`;
    });

    audio.addEventListener('timeupdate', () => {
      if (!seekEl._dragging) seekEl.value = audio.currentTime;
      timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    });

    audio.addEventListener('ended', () => {
      playing = false;
      playBtn.textContent = 'PLAY';
      stopBtn.disabled = true;
      clearInterval(rafId);
      pcmEl.textContent = 'idle';
    });

    // --- Seek ---
    seekEl.addEventListener('mousedown', () => { seekEl._dragging = true; });
    seekEl.addEventListener('mouseup', () => {
      seekEl._dragging = false;
      audio.currentTime = seekEl.value;
    });
    seekEl.addEventListener('input', () => {
      timeEl.textContent = `${fmt(seekEl.value)} / ${fmt(audio.duration)}`;
    });

    // --- Audio context setup ---
    async function setupAudio() {
      if (audioCtx) return;

      // Native-rate context for EQ visualiser — audio plays at full quality
      audioCtx = new AudioContext();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = EQ_BARS * 2;
      const mediaSource = audioCtx.createMediaElementSource(audio);
      mediaSource.connect(analyser);
      analyser.connect(audioCtx.destination); // speakers at native quality

      // Separate 16kHz context for PCM capture → STT only
      const sttCtx = new AudioContext({ sampleRate: 16000 });
      await sttCtx.audioWorklet.addModule('/worklet');
      workletNode = new AudioWorkletNode(sttCtx, 'mj-pcm-logger-worklet');
      const stream = audio.captureStream();
      const streamSource = sttCtx.createMediaStreamSource(stream);
      streamSource.connect(workletNode);
      workletNode.connect(sttCtx.destination);

      // PCM16 chunks arrive here — 1 second each at 16kHz
      workletNode.port.onmessage = (event) => {
        if (!playing) return;
        const pcm16 = event.data; // Int16Array
        sendPcm(pcm16.buffer);
      };
    }

    // --- Send PCM16 to bridge via WebSocket binary frame ---
    function sendPcm(arrayBuffer) {
      pcmChunksSent++;
      pcmEl.textContent = `sending — ${pcmChunksSent} chunks`;
      if (producerWs && producerWs.readyState === WebSocket.OPEN) {
        producerWs.send(arrayBuffer);
      }
    }

    // --- Play / Pause ---
    playBtn.addEventListener('click', async () => {
      await setupAudio();

      if (playing) {
        audio.pause();
        playing = false;
        playBtn.textContent = 'PLAY';
        clearInterval(rafId);
        pcmEl.textContent = 'paused';
      } else {
        await audioCtx.resume();
        await audio.play();
        playing = true;
        playBtn.textContent = 'PAUSE';
        stopBtn.disabled = false;
        sendEqFrames();
      }
    });

    // --- Stop ---
    stopBtn.addEventListener('click', () => {
      audio.pause();
      audio.currentTime = 0;
      seekEl.value = 0;
      playing = false;
      playBtn.textContent = 'PLAY';
      stopBtn.disabled = true;
      clearInterval(rafId);
      pcmChunksSent = 0;
      pcmEl.textContent = 'idle';
    });

    // --- EQ frames via setInterval (not RAF — keeps running when tab is in background) ---
    function sendEqFrames() {
      const freqData = new Uint8Array(analyser.frequencyBinCount);
      rafId = setInterval(() => {
        if (!playing) return;
        analyser.getByteFrequencyData(freqData);
        const bars = Array.from(freqData.slice(0, EQ_BARS)).map(v => Math.round(v));
        if (producerWs && producerWs.readyState === WebSocket.OPEN) {
          producerWs.send(JSON.stringify({ type: 'eq', bars, ts: audio.currentTime }));
        }
      }, 50); // 20fps — smooth enough, runs in background tab
    }
  </script>
</body>
</html>
