    memory: 256M
    instances: 1
    path: .
    buildpacks:
      - nodejs_buildpack
    command: node index.js
    env:
      TRANSPORT: solace
      STT_ENABLED: true
      NODE_ENV: production
      CAP_URL: https://mj-live-cap.cfapps.us10-001.hana.ondemand.com/odata/v4/mj/receiveTranscript
