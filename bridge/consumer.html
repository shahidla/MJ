<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Live — AI Witness</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  /* ── Status ── */
  #ws-status {
    position: fixed;
    top: 10px;
    right: 14px;
    z-index: 50;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #ff9800;
  }
  #ws-status.ok  { color: #4caf50; }
  #ws-status.err { color: #f44336; }

  /* ── Main layout: full screen, flex column ── */
  #main-layout {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  /* ── Section headings ── */
  .section-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(10px, 1vw, 13px);
    letter-spacing: 5px;
    color: #c9a84c;
    opacity: 0.55;
    margin-bottom: 12px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 6px;
  }

  /* ── Top 80%: pipeline + chronicle ── */
  #top-section {
    flex: 0 0 80vh;
    display: flex;
    background: #0f0f0f;
  }

  /* Pipeline: left 75% */
  #pipeline-panel {
    width: 75%;
    padding: 20px 28px 16px;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #pipeline-modes {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .mode-row {
    display: grid;
    grid-template-columns: 36px minmax(100px, 240px) 1fr;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    border-bottom: 1px solid #1a1a1a;
    opacity: 0.2;
    transition: all 0.35s ease;
  }
  .mode-row:last-child { border-bottom: none; }
  .mode-row.done   { opacity: 0.45; }
  .mode-row.active { opacity: 1; }

  .mode-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 1.1vw, 14px);
    color: #555;
    transition: color 0.3s;
  }

  .mode-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 1.4vw, 18px);
    letter-spacing: 3px;
    color: #7a7a7a;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .mode-output {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 1.4vw, 18px); /* same as mode-name */
    color: #555;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 0.4s ease;
    opacity: 0;
  }


  /* Active mode — colour + glow only, no size change */
  .mode-row.active .mode-num    { color: #e5d4a8; }
  .mode-row.active .mode-name   { color: #c9a84c; text-shadow: 0 0 18px rgba(201,168,76,0.5); letter-spacing: 4px; }
  .mode-row.active .mode-output { color: #f0f0f0; opacity: 1; }
  .mode-row.done   .mode-num    { color: #666; }
  .mode-row.done   .mode-name   { color: #888; }
  .mode-row.done   .mode-output { color: #888; opacity: 1; }

  /* Mode 01 PERCEPTION — fixed layout, lyrics don't push other rows */
  #mrow-1                         { align-items: center; }
  #mrow-1 .mode-name              { color: #c9a84c; letter-spacing: 4px; }
  #mrow-1 .mode-output            { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #mrow-1.active .mode-output,
  #mrow-1.done   .mode-output     { color: #ffffff; font-size: clamp(18px, 1.9vw, 26px); font-style: italic; }
  #mrow-1.active .mode-num        { color: #ffffff; }
  #mrow-1.done   .mode-num        { color: #c9a84c; }

  /* Chronicle: right 25% */
  #chronicle-panel {
    width: 25%;
    padding: 20px 18px 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0c0c0c;
  }

  #chronicle-entries {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
    flex: 1;
  }

  .ce {
    padding: 6px 0;
    border-bottom: 1px solid #1a1a1a;
    transition: opacity 0.8s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }

  .ce.entering { transform: translateY(-16px); opacity: 0; }

  .ce-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 2.8vw, 36px);
    letter-spacing: 3px;
    color: #c9a84c;
    line-height: 1;
  }

  .ce-event {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(12px, 1.3vw, 16px);
    color: #e0e0e0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  .ce-emotion {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.85vw, 11px);
    color: #a0d0a0;
    margin-top: 2px;
  }

  /* ── Bottom 20%: EQ canvas + emotions ── */
  #bottom-bar {
    flex: 0 0 20vh;
    display: flex;
    border-top: 1px solid #2a2a2a;
    background: #0a0a0a;
  }

  #eq-container {
    width: 50%;
    padding: 10px 16px;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
  }

  #eq-container .section-heading { margin-bottom: 8px; }

  #eq-canvas {
    flex: 1;
    width: 100%;
    display: block;
  }

  #emotion-container {
    width: 50%;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
  }

  #emotion-entries {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    overflow: hidden;
  }

  .emo-row { display: flex; align-items: center; gap: 10px; }

  .emo-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 1vw, 12px);
    color: #7a7a7a;
    width: 110px;
    text-align: right;
  }

  .emo-bar-bg {
    flex: 1;
    height: 3px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  .emo-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1.2s ease;
  }

  /* ── Pipeline status subtitle ── */
  #pipeline-status {
    position: fixed;
    bottom: 21vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.85vw, 11px);
    letter-spacing: 2px;
    color: rgba(201,168,76,0.5);
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  #pipeline-status.visible { opacity: 1; }

  /* ── Finale: full screen takeover ── */
  #finale-panel {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0);
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease, background 2s ease;
  }
  #finale-panel.visible {
    opacity: 1;
    background: rgba(8,8,8,0.97);
  }
  #finale-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.9vw, 11px);
    letter-spacing: 4px;
    color: rgba(201,168,76,0.35);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  #finale-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(22px, 3vw, 40px);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.92);
    line-height: 1.9;
    text-align: center;
    max-width: 72vw;
    white-space: pre-line;
  }
</style>
</head>
<body>

<div id="ws-status">connecting...</div>

<!-- Main layout -->
<div id="main-layout">

  <!-- Top 80%: Pipeline + Chronicle -->
  <div id="top-section">

    <div id="pipeline-panel">
      <div class="section-heading">AI COGNITIVE PIPELINE</div>
      <div id="pipeline-modes">
        <div class="mode-row" id="mrow-1">
          <span class="mode-num">01</span>
          <span class="mode-name">PERCEPTION</span>
          <span class="mode-output" id="mout-1">listening...</span>
        </div>
        <div class="mode-row" id="mrow-2">
          <span class="mode-num">02</span>
          <span class="mode-name">CLASSIFICATION</span>
          <span class="mode-output" id="mout-2">—</span>
        </div>
        <div class="mode-row" id="mrow-3">
          <span class="mode-num">03</span>
          <span class="mode-name">RAG RETRIEVAL</span>
          <span class="mode-output" id="mout-3">—</span>
        </div>
        <div class="mode-row" id="mrow-4">
          <span class="mode-num">04</span>
          <span class="mode-name">TEMPORAL MEMORY</span>
          <span class="mode-output" id="mout-4">—</span>
        </div>
        <div class="mode-row" id="mrow-5">
          <span class="mode-num">05</span>
          <span class="mode-name">RELATIONAL REASONING</span>
          <span class="mode-output" id="mout-5">—</span>
        </div>
      </div>
    </div>

    <div id="chronicle-panel">
      <div class="section-heading">THE CHRONICLE</div>
      <div id="chronicle-entries"></div>
    </div>

  </div>

  <!-- Bottom 20%: EQ canvas + Emotions -->
  <div id="bottom-bar">
    <div id="eq-container">
      <div class="section-heading">AUDIO SIGNAL</div>
      <canvas id="eq-canvas"></canvas>
    </div>
    <div id="emotion-container">
      <div class="section-heading">EMOTIONAL ARC</div>
      <div id="emotion-entries"></div>
    </div>
  </div>

</div>

<div id="pipeline-status"></div>

<!-- Finale: full screen -->
<div id="finale-panel">
  <div id="finale-label">AI CLOSING REFLECTION</div>
  <div id="finale-text"></div>
</div>

<script src="/solace-client.js"></script>
<script>
const BRIDGE_WS = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
const wsStatus  = document.getElementById('ws-status');

// ── EQ canvas setup ──────────────────────────────────────────────────────────
const eqCanvas = document.getElementById('eq-canvas');
const eqCtx    = eqCanvas.getContext('2d');
const FREQ_BINS = 128;
let freqData = new Uint8Array(FREQ_BINS);
let eqActive = false;
let lastEqTs = 0;

function resizeEq() {
  eqCanvas.width  = eqCanvas.offsetWidth;
  eqCanvas.height = eqCanvas.offsetHeight;
}
resizeEq();
window.addEventListener('resize', resizeEq);

function drawEq() {
  requestAnimationFrame(drawEq);
  const w = eqCanvas.width, h = eqCanvas.height;
  eqCtx.clearRect(0, 0, w, h);

  const idle = !eqActive || (Date.now() - lastEqTs > 1000);
  if (idle) {
    // idle pulse
    eqCtx.strokeStyle = 'rgba(201,168,76,0.1)';
    eqCtx.lineWidth = 1;
    eqCtx.beginPath();
    eqCtx.moveTo(0, h); eqCtx.lineTo(w, h);
    eqCtx.stroke();
    return;
  }

  const barW = w / FREQ_BINS;
  for (let i = 0; i < FREQ_BINS; i++) {
    const val  = freqData[i] / 255;
    const barH = val * h * 0.9;
    const x    = i * barW;
    const hue  = (i / FREQ_BINS) * 50 + 20;
    const grad = eqCtx.createLinearGradient(x, h, x, h - barH);
    grad.addColorStop(0, `hsla(${hue}, 80%, 55%, 0.9)`);
    grad.addColorStop(1, `hsla(${hue + 30}, 90%, 75%, 0.0)`);
    eqCtx.fillStyle = grad;
    eqCtx.fillRect(x, h - barH, barW - 1, barH);
  }

  // Floor line
  eqCtx.strokeStyle = 'rgba(201,168,76,0.3)';
  eqCtx.lineWidth = 1;
  eqCtx.beginPath();
  eqCtx.moveTo(0, h); eqCtx.lineTo(w, h);
  eqCtx.stroke();
}
drawEq();

// ── EQ handler ──────────────────────────────────────────────────────────────
function handleEqPayload(payload) {
  const bars = payload.bars;
  if (!bars) return;
  const step = FREQ_BINS / bars.length;
  for (let i = 0; i < FREQ_BINS; i++) freqData[i] = bars[Math.floor(i / step)] || 0;
  eqActive  = true;
  lastEqTs  = Date.now();
}

// ── Emotion tracking ─────────────────────────────────────────────────────────
const emotionCounts  = {};
const emotionColours = ['#c9a84c','#4a7c9e','#c0392b','#27ae60','#8e44ad','#e67e22'];

function trackEmotion(emotionText) {
  if (!emotionText) return;
  const primary = emotionText.split(/[,\/]/)[0].trim().toLowerCase();
  if (!primary) return;
  emotionCounts[primary] = (emotionCounts[primary] || 0) + 1;
  renderEmotions();
}

function renderEmotions() {
  const total  = Object.values(emotionCounts).reduce((a, b) => a + b, 0);
  const sorted = Object.entries(emotionCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
  document.getElementById('emotion-entries').innerHTML = sorted.map(([em, cnt], i) => {
    const pct = Math.round((cnt / total) * 100);
    return `<div class="emo-row">
      <div class="emo-label">${em}</div>
      <div class="emo-bar-bg"><div class="emo-bar-fill" style="width:${pct}%;background:${emotionColours[i]}"></div></div>
    </div>`;
  }).join('');
}

// ── Mode management ───────────────────────────────────────────────────────────
function setModeActive(num) {
  for (let i = 1; i <= 5; i++) {
    const row = document.getElementById(`mrow-${i}`);
    if (!row) continue;
    row.classList.remove('active', 'done');
    if (i < num) row.classList.add('done');
    else if (i === num) row.classList.add('active');
  }
}

function setModeOutput(num, text) {
  const el = document.getElementById(`mout-${num}`);
  if (el && text) el.textContent = text;
}

function resetModes() {
  for (let i = 1; i <= 5; i++) {
    const row = document.getElementById(`mrow-${i}`);
    if (row) row.classList.remove('active', 'done');
  }
  lastPartialText = '';
}

// ── Pipeline status subtitle ─────────────────────────────────────────────────
let statusTimer = null;
function showStatus(text) {
  const el = document.getElementById('pipeline-status');
  el.textContent = text;
  el.classList.add('visible');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.classList.remove('visible'), 3500);
}

// ── Pipeline/status handler ───────────────────────────────────────────────────
function handlePipelineStatus(payload) {
  const { mode, label } = payload;
  if (mode >= 1 && mode <= 5) {
    if (mode === 1) resetModes();
    setModeActive(mode);
  }
  showStatus(label);
}

// ── Chronicle/event handler ───────────────────────────────────────────────────
const seenEvents = new Set();
function handleChronicleEvent(payload) {
  const key = payload.transcript?.substring(0, 40) + payload.emotion;
  if (seenEvents.has(key)) return;
  seenEvents.add(key);
  setModeOutput(1, payload.transcript);
  setModeOutput(2, `${payload.emotion || '—'} · ${payload.year || '—'}${payload.figure ? ' · ' + payload.figure : ''}`);
  setModeOutput(3, (payload.ragContext || '').substring(0, 100) + (payload.ragContext?.length > 100 ? '…' : ''));
  setModeOutput(4, Object.keys(emotionCounts).join(' → ') || '—');
  setModeOutput(5, payload.insight);
  setModeActive(5);
  setTimeout(() => {
    const r = document.getElementById('mrow-5');
    if (r) { r.classList.remove('active'); r.classList.add('done'); }
  }, 2500);

  addChronicleEntry(payload);
  trackEmotion(payload.emotion);
}

// ── Chronicle entry ───────────────────────────────────────────────────────────
function addChronicleEntry(payload) {
  const container = document.getElementById('chronicle-entries');
  const entry = document.createElement('div');
  entry.className = 'ce entering';
  entry.innerHTML = `
    <div class="ce-year">${payload.year || '—'}</div>
    <div class="ce-event">${payload.event || ''}</div>
    ${payload.figure ? `<div class="ce-event" style="color:#c9a84c;font-size:clamp(11px,1.1vw,14px)">${payload.figure}</div>` : ''}
    <div class="ce-emotion">${(payload.emotion || '').split(',')[0].trim()}</div>
  `;
  container.insertBefore(entry, container.firstChild);
  requestAnimationFrame(() => requestAnimationFrame(() => entry.classList.remove('entering')));

  // Fade older entries
  const entries = container.querySelectorAll('.ce');
  entries.forEach((el, i) => {
    el.style.opacity = Math.max(0.08, 1 - i * 0.2);
  });
  if (entries.length > 10) entries[entries.length - 1].remove();
}

// ── Finale ────────────────────────────────────────────────────────────────────
function handleFinale(payload) {
  document.getElementById('finale-text').textContent = payload.reflection || '';
  document.getElementById('finale-panel').classList.add('visible');
  showStatus('AI closing reflection');
}

// ── STT transcript (live partial/final → mode 01, delta only) ────────────────
let lastPartialText  = '';
let perceptionTimer  = null;

function getDelta(prev, curr) {
  const pw = prev.trim().split(/\s+/).filter(Boolean);
  const cw = curr.trim().split(/\s+/).filter(Boolean);
  let i = 0;
  while (i < pw.length && i < cw.length && pw[i] === cw[i]) i++;
  return cw.slice(i).join(' ');
}

function handleTranscript(text, isFinal) {
  if (!text) return;
  const el = document.getElementById('mout-1');
  if (!el) return;

  const delta = getDelta(lastPartialText, text);
  lastPartialText = text;
  const display = delta || text; // fallback to full text if no delta

  el.style.transition = 'opacity 0.15s ease';
  el.style.opacity = '0';
  clearTimeout(perceptionTimer);
  perceptionTimer = setTimeout(() => {
    el.textContent = display;
    el.style.opacity = '1';
  }, 150);

  const r1 = document.getElementById('mrow-1');
  if (r1 && !r1.classList.contains('active') && !r1.classList.contains('done')) {
    r1.classList.add('active');
  }
}

// ── Bridge WebSocket (always connect for live partials) ───────────────────────
function connectBridge() {
  const ws = new WebSocket(BRIDGE_WS);
  ws.onopen = () => { wsStatus.textContent = 'live'; wsStatus.className = 'ok'; };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (!msg.data) return;
      if (msg.topic === 'audio/equalizer')     handleEqPayload(msg.data);
      if (msg.topic === 'chronicle/transcript') handleTranscript(msg.data.text, msg.data.isFinal);
      if (msg.topic === 'chronicle/event')      handleChronicleEvent(msg.data);
      if (msg.topic === 'chronicle/finale')     handleFinale(msg.data);
      if (msg.topic === 'pipeline/status')      handlePipelineStatus(msg.data);
    } catch (_) {}
  };
  ws.onclose = () => {
    wsStatus.textContent = 'reconnecting...';
    wsStatus.className = 'err';
    setTimeout(connectBridge, 2000);
  };
}

// ── Solace direct ─────────────────────────────────────────────────────────────
function connectSolace(cfg) {
  solace.SolclientFactory.init({ profile: solace.SolclientFactoryProfiles.version10 });
  const session = solace.SolclientFactory.createSession({
    url: cfg.url, vpnName: cfg.vpn, userName: cfg.username, password: cfg.password
  });
  session.on(solace.SessionEventCode.UP_NOTICE, () => {
    wsStatus.textContent = 'solace live'; wsStatus.className = 'ok';
    ['audio/equalizer','chronicle/event','chronicle/finale','pipeline/status'].forEach((t, i) => {
      session.subscribe(solace.SolclientFactory.createTopicDestination(t), true, t, 1000 + i);
    });
  });
  session.on(solace.SessionEventCode.MESSAGE, (msg) => {
    try {
      const topic = msg.getDestination().getName();
      let raw;
      if (msg.getSdtContainer()) raw = msg.getSdtContainer().getValue();
      else if (msg.getBinaryAttachment()) {
        const bin = msg.getBinaryAttachment();
        raw = typeof bin === 'string' ? bin : new TextDecoder().decode(bin);
      }
      const payload = JSON.parse(raw);
      if      (topic === 'audio/equalizer')  handleEqPayload(payload);
      else if (topic === 'chronicle/event')  handleChronicleEvent(payload);
      else if (topic === 'chronicle/finale') handleFinale(payload);
      else if (topic === 'pipeline/status')  handlePipelineStatus(payload);
    } catch (e) { console.error('Solace msg error:', e); }
  });
  session.on(solace.SessionEventCode.DISCONNECTED, () => {
    wsStatus.textContent = 'reconnecting...'; wsStatus.className = 'err';
    setTimeout(() => connectSolace(cfg), 5000);
  });
  session.on(solace.SessionEventCode.CONNECT_FAILED_ERROR, () => {
    wsStatus.textContent = 'solace error'; wsStatus.className = 'err';
  });
  session.connect();
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function bootstrap() {
  try {
    const cfg = await fetch('/solace-config').then(r => r.json());
    if (cfg.transport === 'solace') connectSolace(cfg);
    // Always connect bridge for live STT partials → mode 01
    connectBridge();
  } catch (e) {
    connectBridge();
  }
}
bootstrap();
</script>
</body>
</html>
