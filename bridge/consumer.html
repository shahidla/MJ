<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Live — AI Witness</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Status indicator ── */
  #ws-status {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 40;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #ff9800;
    opacity: 0.7;
  }
  #ws-status.ok  { color: #4caf50; }
  #ws-status.err { color: #f44336; }

  /* ── Main layout — bottom 73% of screen. WebGL visible in top 27% only ── */
  #main-layout {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 73vh;
    display: flex;
    z-index: 20;
    pointer-events: none;
    background: rgba(15,15,15,0.92);
    border-top: 1px solid #2a2a2a;
  }

  /* ── Section shared styles ── */
  .panel {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
  }

  .section-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(11px, 1.1vw, 14px);
    letter-spacing: 5px;
    color: #c9a84c;
    opacity: 0.6;
    margin-bottom: 12px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 8px;
  }

  /* ── Pipeline panel — left 62% ── */
  #pipeline-panel {
    width: 62vw;
    border-right: 1px solid rgba(255,255,255,0.05);
  }

  #pipeline-modes {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    overflow: hidden;
  }

  .mode-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: baseline;
    gap: 12px;
    padding: 4px 0;
    transition: all 0.35s ease;
    opacity: 0.22;
  }

  .mode-row.done { opacity: 0.45; }
  .mode-row.active { opacity: 1; }

  .mode-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 1vw, 13px);
    color: #7a7a7a;
    transition: color 0.3s;
  }

  .mode-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 1.3vw, 17px);
    letter-spacing: 3px;
    color: #7a7a7a;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .mode-output {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(11px, 1.05vw, 14px);
    color: #555;
    text-align: right;
    max-width: 34vw;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 0.5s ease;
    opacity: 0;
  }

  /* Active mode — pops out bold and gold */
  .mode-row.active .mode-num { color: #e5d4a8; font-weight: bold; }
  .mode-row.active .mode-name {
    color: #c9a84c;
    font-size: clamp(16px, 1.8vw, 22px);
    letter-spacing: 4px;
    text-shadow: 0 0 24px rgba(201,168,76,0.6), 0 0 8px rgba(201,168,76,0.3);
  }
  .mode-row.active .mode-output {
    color: #f5f5f5;
    opacity: 1;
    font-size: clamp(13px, 1.3vw, 17px);
  }
  .mode-row.done .mode-num   { color: #9a9a9a; }
  .mode-row.done .mode-name  { color: #9a9a9a; }
  .mode-row.done .mode-output { color: #9a9a9a; opacity: 1; font-size: clamp(12px, 1.1vw, 14px); }

  /* Emotion bars */
  #emotion-bar-panel {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .emotion-row { display: flex; align-items: center; gap: 8px; }
  .emotion-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.9vw, 12px);
    letter-spacing: 1px;
    color: #7a7a7a;
    width: 100px;
    text-align: right;
    text-transform: lowercase;
  }
  .emotion-bar-bg {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
  }
  .emotion-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 1px;
    transition: width 1.2s ease;
  }

  /* ── Chronicle panel — right 38% ── */
  #chronicle-panel {
    width: 38vw;
  }

  #chronicle-entries {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
    flex: 1;
  }

  .chronicle-entry {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: baseline;
    gap: 10px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: opacity 0.8s ease, transform 0.5s ease;
    transform: translateY(0);
  }

  .chronicle-entry.entering {
    transform: translateY(-20px);
    opacity: 0;
    max-height: 0;
  }

  .chronicle-entry {
    max-height: 60px;
    transition: opacity 0.8s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1), max-height 0.5s ease;
  }

  .ce-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 2.5vw, 32px);
    letter-spacing: 3px;
    color: #c9a84c;
    line-height: 1;
  }

  .ce-event {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(12px, 1.3vw, 16px);
    color: #e8e8e8;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ce-emotion {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.85vw, 11px);
    color: #a0d0a0;
    text-transform: lowercase;
    white-space: nowrap;
  }

  /* ── Pipeline status subtitle ── */
  #pipeline-status {
    position: fixed;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.85vw, 11px);
    letter-spacing: 2px;
    color: rgba(201,168,76,0.5);
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  #pipeline-status.visible { opacity: 1; }

  /* ── Title overlay (fades when playing) ── */
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  #title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 120px);
    letter-spacing: 12px;
    color: #fff;
    opacity: 0.06;
    transition: opacity 1s ease;
  }
  #title.playing { opacity: 0.02; }
  #subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 6px;
    color: #c9a84c;
    opacity: 0.3;
    margin-top: 12px;
    transition: opacity 1s ease;
  }
  #subtitle.playing { opacity: 0.08; }

  /* ── Transcript panel (STT live) ── */
  #transcript-panel {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 25;
    width: 60vw;
    text-align: center;
    pointer-events: none;
  }
  #transcript-partial {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(11px, 1.3vw, 16px);
    color: rgba(201,168,76,0.35);
    letter-spacing: 2px;
    min-height: 1.4em;
  }

  /* Between-act reflection removed — one final reflection only */

  /* ── Finale ── */
  #finale-panel {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0);
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease, background 2s ease;
  }
  #finale-panel.visible { opacity: 1; background: rgba(0,0,0,0.88); }
  #finale-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 0.9vw, 11px);
    letter-spacing: 4px;
    color: rgba(201,168,76,0.4);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  #finale-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(18px, 2.4vw, 30px);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.92);
    line-height: 1.9;
    text-align: center;
    max-width: 68vw;
    white-space: pre-line;
  }

  /* ── Progress bar (reserved for map) ── */
  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #c9a84c;
    width: 0%;
    z-index: 30;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px #c9a84c;
  }

  #spotlight {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, -50%);
    transition: left 0.1s ease, top 0.1s ease;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <div id="title">MJ LIVE</div>
  <div id="subtitle">an AI witnessing humanity's journey</div>
</div>

<div id="ws-status">connecting...</div>

<div id="transcript-panel">
  <div id="transcript-partial"></div>
</div>

<!-- Main layout -->
<div id="main-layout">

  <!-- Left: AI Cognitive Pipeline -->
  <div class="panel" id="pipeline-panel">
    <div class="section-heading">AI COGNITIVE PIPELINE</div>
    <div id="pipeline-modes">
      <div class="mode-row" id="mrow-1">
        <span class="mode-num">01</span>
        <span class="mode-name">PERCEPTION</span>
        <span class="mode-output" id="mout-1">—</span>
      </div>
      <div class="mode-row" id="mrow-2">
        <span class="mode-num">02</span>
        <span class="mode-name">CLASSIFICATION</span>
        <span class="mode-output" id="mout-2">—</span>
      </div>
      <div class="mode-row" id="mrow-3">
        <span class="mode-num">03</span>
        <span class="mode-name">RAG RETRIEVAL</span>
        <span class="mode-output" id="mout-3">—</span>
      </div>
      <div class="mode-row" id="mrow-4">
        <span class="mode-num">04</span>
        <span class="mode-name">TEMPORAL MEMORY</span>
        <span class="mode-output" id="mout-4">—</span>
      </div>
      <div class="mode-row" id="mrow-5">
        <span class="mode-num">05</span>
        <span class="mode-name">RELATIONAL REASONING</span>
        <span class="mode-output" id="mout-5">—</span>
      </div>
      <div class="mode-row" id="mrow-6">
        <span class="mode-num">06</span>
        <span class="mode-name">REFLECTIVE EVALUATION</span>
        <span class="mode-output" id="mout-6">—</span>
      </div>
      <div class="mode-row" id="mrow-7">
        <span class="mode-num">07</span>
        <span class="mode-name">PATTERN SYNTHESIS</span>
        <span class="mode-output" id="mout-7">—</span>
      </div>
      <div class="mode-row" id="mrow-8">
        <span class="mode-num">08</span>
        <span class="mode-name">GENERATIVE EXPRESSION</span>
        <span class="mode-output" id="mout-8">—</span>
      </div>
    </div>
    <!-- EQ rendered on canvas in this area — no HTML bars needed -->
  </div>

  <!-- Right: The Chronicle -->
  <div class="panel" id="chronicle-panel">
    <div class="section-heading">THE CHRONICLE</div>
    <div id="chronicle-entries"></div>
  </div>

</div>

<div id="pipeline-status"></div>

<div id="finale-panel">
  <div id="finale-label">AI CLOSING REFLECTION</div>
  <div id="finale-text"></div>
</div>

<div id="progress-bar"></div>

<script src="/solace-client.js"></script>
<script>
const BRIDGE_WS = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
const FREQ_BINS = 128;

let pendingPartial = '';
let transcriptDirty = false;

const canvas = document.getElementById('c');
const c = canvas.getContext('2d');
let freqData = new Uint8Array(FREQ_BINS);
let timeData = new Uint8Array(FREQ_BINS);
let externalData = false;
let lastFrameTs = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);


const wsStatus = document.getElementById('ws-status');

// ── EQ handler ──
function handleEqPayload(payload) {
  const bars = payload.bars;
  if (!bars) return;
  const maxBar = Math.max(...bars);
  const step = FREQ_BINS / bars.length;
  for (let i = 0; i < FREQ_BINS; i++) freqData[i] = bars[Math.floor(i / step)] || 0;
  const avg = bars.reduce((a, b) => a + b, 0) / bars.length;
  for (let i = 0; i < FREQ_BINS; i++) timeData[i] = 128 + Math.round((Math.random() - 0.5) * avg * 0.4);
  externalData = true;
  lastFrameTs = Date.now();
}

// ── Emotion tracking (for mode 04 output) ──
const emotionCounts = {};

function trackEmotion(emotionText) {
  if (!emotionText) return;
  const primary = emotionText.split(/[,\/]/)[0].trim().toLowerCase();
  if (!primary) return;
  emotionCounts[primary] = (emotionCounts[primary] || 0) + 1;
}

// ── Pipeline mode management ──
function setModeActive(num) {
  for (let i = 1; i <= 8; i++) {
    const row = document.getElementById(`mrow-${i}`);
    if (!row) continue;
    if (i < num) {
      row.classList.remove('active');
      row.classList.add('done');
    } else if (i === num) {
      row.classList.add('active');
      row.classList.remove('done');
    } else {
      row.classList.remove('active', 'done');
    }
  }
}

function setModeOutput(num, text) {
  const el = document.getElementById(`mout-${num}`);
  if (el) el.textContent = text || '—';
}

function resetModes() {
  for (let i = 1; i <= 8; i++) {
    const row = document.getElementById(`mrow-${i}`);
    if (row) row.classList.remove('active', 'done');
  }
}

// ── Pipeline status subtitle ──
let statusTimer = null;
function showStatus(text) {
  const el = document.getElementById('pipeline-status');
  el.textContent = text;
  el.classList.add('visible');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.classList.remove('visible'), 3500);
}

// ── Handle pipeline/status events ──
function handlePipelineStatus(payload) {
  const { mode, label } = payload;
  if (mode === 1) resetModes();
  setModeActive(mode);
  showStatus(label);
}

// ── Handle chronicle/event — fills mode outputs ──
function handleChronicleEvent(payload) {
  // Fill mode outputs with actual data
  setModeOutput(1, payload.transcript);
  setModeOutput(2, `${payload.emotion || '—'} · ${payload.year || '—'}`);
  setModeOutput(3, (payload.ragContext || '').substring(0, 80) + (payload.ragContext?.length > 80 ? '…' : ''));
  setModeOutput(4, Object.keys(emotionCounts).join(' → ') || '—');
  setModeOutput(5, payload.insight);
  setModeActive(5);
  setTimeout(() => {
    const row5 = document.getElementById('mrow-5');
    if (row5) { row5.classList.remove('active'); row5.classList.add('done'); }
  }, 2000);

  addChronicleEntry(payload);
  trackEmotion(payload.emotion);

  document.getElementById('title').classList.add('playing');
  document.getElementById('subtitle').classList.add('playing');
}

// ── Chronicle — newest on top, auto-scroll, fade old ──
function addChronicleEntry(payload) {
  const container = document.getElementById('chronicle-entries');
  const entry = document.createElement('div');
  entry.className = 'chronicle-entry entering';
  entry.innerHTML = `
    <span class="ce-year">${payload.year || '—'}</span>
    <span class="ce-event">${payload.event || ''}</span>
    <span class="ce-emotion">${(payload.emotion || '').split(',')[0].trim()}</span>
  `;

  // Insert at top
  container.insertBefore(entry, container.firstChild);

  // Animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => entry.classList.remove('entering'));
  });

  // Fade older entries progressively
  const entries = container.querySelectorAll('.chronicle-entry');
  entries.forEach((el, i) => {
    el.style.opacity = Math.max(0.08, 1 - i * 0.18);
    el.style.fontSize = i === 0 ? '' : `${Math.max(80, 100 - i * 5)}%`;
  });

  // Remove very old entries
  if (entries.length > 12) entries[entries.length - 1].remove();
}

// ── Finale (modes 06→07→08 fire in sequence from CAP pipeline/status) ──
function handleFinale(payload) {
  const reflection = payload.reflection || '';
  document.getElementById('finale-text').textContent = reflection;
  const panel = document.getElementById('finale-panel');
  panel.classList.add('visible');
  // Mode 08 output shows the closing line Claude generated
  const lines = reflection.split('\n').filter(l => l.trim());
  const closingLine = lines[lines.length - 1] || '';
  setModeOutput(8, closingLine);
}

// ── Transcript (STT live partial) ──
function handleTranscript(text, isFinal) {
  if (isFinal) {
    pendingPartial = '';
  } else {
    pendingPartial = text;
    // Show live STT in mode 01 output in real time
    setModeOutput(1, text.substring(0, 120) + (text.length > 120 ? '…' : ''));
    if (!document.getElementById('mrow-1').classList.contains('active')) {
      document.getElementById('mrow-1').classList.remove('done');
      document.getElementById('mrow-1').style.opacity = '0.6';
    }
  }
  transcriptDirty = true;
}

// ── Bridge WebSocket (local transport) ──
function connectBridge() {
  const ws = new WebSocket(BRIDGE_WS);
  ws.onopen = () => { wsStatus.textContent = 'live'; wsStatus.className = 'ok'; };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.topic === 'audio/equalizer' && msg.data) handleEqPayload(msg.data);
      else if (msg.topic === 'chronicle/transcript' && msg.data)
        handleTranscript(msg.data.text, msg.data.isFinal);
    } catch (_) {}
  };
  ws.onclose = () => {
    wsStatus.textContent = 'reconnecting...';
    wsStatus.className = 'err';
    externalData = false;
    setTimeout(connectBridge, 2000);
  };
  ws.onerror = () => { wsStatus.textContent = 'error'; wsStatus.className = 'err'; };
}

// ── Solace direct ──
function connectSolace(cfg) {
  solace.SolclientFactory.init({ profile: solace.SolclientFactoryProfiles.version10 });
  const session = solace.SolclientFactory.createSession({
    url: cfg.url, vpnName: cfg.vpn, userName: cfg.username, password: cfg.password
  });
  session.on(solace.SessionEventCode.UP_NOTICE, () => {
    wsStatus.textContent = 'solace live';
    wsStatus.className = 'ok';
    const topics = ['audio/equalizer','chronicle/event','chronicle/finale','pipeline/status'];
    topics.forEach((t, i) => session.subscribe(solace.SolclientFactory.createTopicDestination(t), true, t, 1000 + i));
  });
  session.on(solace.SessionEventCode.MESSAGE, (msg) => {
    try {
      const topic = msg.getDestination().getName();
      let raw;
      if (msg.getSdtContainer()) raw = msg.getSdtContainer().getValue();
      else if (msg.getBinaryAttachment()) {
        const bin = msg.getBinaryAttachment();
        raw = typeof bin === 'string' ? bin : new TextDecoder().decode(bin);
      }
      const payload = JSON.parse(raw);
      if      (topic === 'audio/equalizer')    handleEqPayload(payload);
      else if (topic === 'chronicle/event')   handleChronicleEvent(payload);
      else if (topic === 'chronicle/finale')  handleFinale(payload);
      else if (topic === 'pipeline/status')   handlePipelineStatus(payload);
    } catch (e) { console.error('Solace message error:', e); }
  });
  session.on(solace.SessionEventCode.CONNECT_FAILED_ERROR, (e) => {
    wsStatus.textContent = 'solace error'; wsStatus.className = 'err';
  });
  session.on(solace.SessionEventCode.DISCONNECTED, () => {
    wsStatus.textContent = 'reconnecting...'; wsStatus.className = 'err';
    setTimeout(() => connectSolace(cfg), 5000);
  });
  session.connect();
}

// ── Bootstrap ──
async function bootstrap() {
  try {
    const cfg = await fetch('/solace-config').then(r => r.json());
    if (cfg.transport === 'solace') connectSolace(cfg);
    else connectBridge();
  } catch (e) { connectBridge(); }
}
bootstrap();

// ============ VISUALIZER ============
let hue = 0;
let prevEnergy = 0;
let beatPulse = 0;
const particles = [];
const PARTICLE_COUNT = 180;

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    size: Math.random() * 2 + 0.5,
    hue: Math.random() * 40 + 20,
  });
}

function getEnergy(data, lo, hi) {
  let sum = 0;
  for (let i = lo; i < hi; i++) sum += data[i];
  return sum / (hi - lo) / 255;
}

function draw() {
  requestAnimationFrame(draw);

  if (transcriptDirty) {
    document.getElementById('transcript-partial').textContent = pendingPartial;
    transcriptDirty = false;
  }

  const w = canvas.width, h = canvas.height;
  const idle = !externalData || (Date.now() - lastFrameTs > 1000);

  if (idle) {
    c.fillStyle = 'rgba(0,0,0,0.15)';
    c.fillRect(0, 0, w, h);
    drawIdleParticles(w, h);
    return;
  }

  const bass = getEnergy(freqData, 0, 10);
  const mid  = getEnergy(freqData, 10, 80);
  const high = getEnergy(freqData, 80, FREQ_BINS);
  const energy = bass * 0.6 + mid * 0.3 + high * 0.1;

  const isBeat = energy > prevEnergy * 1.3 && energy > 0.15;
  if (isBeat) beatPulse = 1;
  beatPulse *= 0.92;
  prevEnergy = energy * 0.8 + prevEnergy * 0.2;

  c.fillStyle = `rgba(0,0,0,${0.25 + bass * 0.1})`;
  c.fillRect(0, 0, w, h);

  // EQ — bottom-left only, same footprint as emotion bars panel
  // Pipeline panel: 62vw wide, emotion bars at very bottom of it
  const eqW   = w * 0.58;         // ~58% of screen width (pipeline panel minus padding)
  const eqH   = h * 0.08;         // 8% tall — same height as emotion bars area
  const eqX   = 20;               // left padding
  const eqY   = h - 20;           // 20px from bottom
  const barCount = FREQ_BINS;
  const barW  = eqW / barCount;

  for (let i = 0; i < barCount; i++) {
    const val = freqData[i] / 255;
    const barH = val * eqH;
    const x = eqX + i * barW;
    const hueShift = (i / barCount) * 50 + hue;
    const grad = c.createLinearGradient(x, eqY, x, eqY - barH);
    grad.addColorStop(0, `hsla(${hueShift}, 70%, 40%, 0.8)`);
    grad.addColorStop(1, `hsla(${hueShift + 30}, 90%, 65%, 0.0)`);
    c.fillStyle = grad;
    c.fillRect(x, eqY - barH, barW - 1, barH);
  }

  // Floor line
  c.strokeStyle = `rgba(201,168,76,${0.1 + bass * 0.2})`;
  c.lineWidth = 1;
  c.beginPath(); c.moveTo(eqX, eqY); c.lineTo(eqX + eqW, eqY); c.stroke();

  for (const p of particles) {
    p.x += p.vx * (1 + energy * 3);
    p.y += p.vy * (1 + energy * 3);
    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
    const brightness = 40 + energy * 60;
    c.beginPath();
    c.arc(p.x, p.y, p.size * (1 + bass * 2), 0, Math.PI * 2);
    c.fillStyle = `hsla(${p.hue + hue},80%,${brightness}%,${0.3 + energy * 0.5})`;
    c.fill();
  }

  const glowR = 80 + energy * 200 + beatPulse * 150;
  const glow = c.createRadialGradient(w/2, floorY, 0, w/2, floorY, glowR);
  glow.addColorStop(0, `rgba(201,168,76,${0.08 + energy * 0.15})`);
  glow.addColorStop(1, 'rgba(201,168,76,0)');
  c.fillStyle = glow;
  c.fillRect(0, 0, w, h);

  hue = (hue + 0.08) % 360;
}

function drawIdleParticles(w, h) {
  hue = (hue + 0.05) % 360;
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
    c.beginPath();
    c.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    c.fillStyle = `hsla(${p.hue + hue},60%,50%,0.15)`;
    c.fill();
  }
}

draw();
</script>
