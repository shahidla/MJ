<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ — Concert Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Bebas Neue', sans-serif;
    cursor: default;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  #title {
    font-size: clamp(48px, 10vw, 120px);
    letter-spacing: 12px;
    color: #fff;
    opacity: 0.08;
    text-align: center;
    line-height: 1;
    transition: opacity 1s ease;
  }

  #title.playing { opacity: 0.04; }

  #subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 6px;
    color: #c9a84c;
    opacity: 0.4;
    margin-top: 12px;
    transition: opacity 1s ease;
  }

  #subtitle.playing { opacity: 0.15; }

  #ws-status {
    position: fixed;
    top: 12px;
    right: 16px;
    z-index: 40;
    font-size: 11px;
    letter-spacing: 2px;
    color: #ff9800;
    opacity: 0.7;
  }

  #ws-status.ok { color: #4caf50; }
  #ws-status.err { color: #f44336; }

  #transcript-panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 40;
    width: 70vw;
    text-align: center;
    pointer-events: none;
    max-height: 40vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  #transcript-partial {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 2vw, 22px);
    color: rgba(201,168,76,0.5);
    letter-spacing: 3px;
    min-height: 1.5em;
    transition: opacity 0.3s ease;
  }

  #transcript-history {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 6px;
  }

  .transcript-line {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(14px, 2.2vw, 28px);
    letter-spacing: 6px;
    color: rgba(255,255,255,0.85);
    transition: opacity 0.5s ease;
  }

  .transcript-line.old {
    font-size: clamp(11px, 1.4vw, 18px);
    color: rgba(255,255,255,0.35);
  }

  /* ── Bottom panels ────────────────────────────────────────────────── */
  #bottom-panels {
    position: fixed;
    bottom: 80px;
    left: 0;
    right: 0;
    z-index: 40;
    display: flex;
    gap: 0;
    pointer-events: none;
    height: 38vh;
  }

  /* Left — cognitive mode indicator */
  #cognitive-panel {
    width: 28vw;
    padding: 0 2vw;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 8px;
  }

  #cognitive-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(10px, 1.1vw, 13px);
    letter-spacing: 3px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .cognitive-mode {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(11px, 1.3vw, 16px);
    letter-spacing: 4px;
    color: rgba(255,255,255,0.2);
    transition: color 0.4s ease, opacity 0.4s ease;
    padding: 2px 0;
  }

  .cognitive-mode.active {
    color: rgba(201,168,76,0.9);
  }

  .cognitive-mode.done {
    color: rgba(255,255,255,0.45);
  }

  #emotion-bar-panel {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .emotion-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .emotion-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(9px, 1vw, 12px);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    width: 60px;
    text-align: right;
  }

  .emotion-bar-bg {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
  }

  .emotion-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 1px;
    transition: width 1.2s ease;
  }

  /* Centre — year reveal */
  #year-panel {
    width: 44vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 12px;
  }

  #year-reveal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 10vw, 140px);
    letter-spacing: 16px;
    color: rgba(255,255,255,0.0);
    line-height: 1;
    transition: color 1.5s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1);
    transform: translateY(20px);
    text-shadow: 0 0 40px rgba(201,168,76,0);
  }

  #year-reveal.visible {
    color: rgba(255,255,255,0.92);
    transform: translateY(0);
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  #year-event {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(12px, 1.6vw, 18px);
    letter-spacing: 2px;
    color: rgba(201,168,76,0.7);
    text-align: center;
    margin-top: 6px;
    max-width: 36vw;
    min-height: 1.4em;
    transition: opacity 0.8s ease;
  }

  /* Right — chronicle accumulates */
  #chronicle-panel {
    width: 28vw;
    padding: 0 2vw;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 0;
    overflow: hidden;
  }

  #chronicle-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(10px, 1.1vw, 13px);
    letter-spacing: 3px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #chronicle-entries {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
    max-height: 32vh;
  }

  .chronicle-entry {
    opacity: 0;
    transform: translateX(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .chronicle-entry.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .chronicle-entry.faded {
    opacity: 0.3;
  }

  .ce-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 1.6vw, 20px);
    letter-spacing: 5px;
    color: rgba(201,168,76,0.8);
    line-height: 1;
  }

  .ce-event {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(10px, 1.1vw, 13px);
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .ce-insight {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(9px, 0.95vw, 11px);
    letter-spacing: 0.5px;
    color: rgba(201,168,76,0.4);
    margin-top: 2px;
  }

  .ce-heard {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(8px, 0.8vw, 10px);
    color: rgba(255,255,255,0.25);
    margin-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 3px;
  }

  .ce-heard span.label {
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 8px;
  }

  .ce-rag {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(8px, 0.75vw, 9px);
    color: rgba(100,180,255,0.35);
    margin-top: 2px;
  }

  .ce-rag span.label {
    color: rgba(100,180,255,0.2);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 8px;
  }

  /* Between-act reflection */
  #reflection-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50;
    width: 60vw;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  #reflection-panel.visible { opacity: 1; }

  #reflection-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(18px, 2.5vw, 32px);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
  }

  /* Finale */
  #finale-panel {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0);
    pointer-events: none;
    opacity: 0;
    transition: opacity 2s ease, background 2s ease;
  }

  #finale-panel.visible {
    opacity: 1;
    background: rgba(0,0,0,0.85);
  }

  #finale-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(16px, 2.2vw, 28px);
    letter-spacing: 2px;
    color: rgba(255,255,255,0.9);
    line-height: 1.8;
    text-align: center;
    max-width: 65vw;
    white-space: pre-line;
  }

  #finale-closing {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 56px);
    letter-spacing: 10px;
    color: rgba(201,168,76,0.9);
    margin-top: 40px;
    opacity: 0;
    transition: opacity 2s ease;
  }

  #finale-closing.visible { opacity: 1; }

  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #c9a84c;
    width: 0%;
    z-index: 30;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px #c9a84c;
  }

  #spotlight {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, -50%);
    transition: left 0.1s ease, top 0.1s ease;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="spotlight"></div>

<div id="overlay">
  <div id="title">BILLIE JEAN</div>
  <div id="subtitle">Michael Jackson — Thriller</div>
</div>

<div id="ws-status">connecting...</div>
<div id="eq-debug" style="position:fixed;top:28px;right:16px;z-index:40;font-size:11px;letter-spacing:2px;color:#c9a84c;opacity:0.7;">EQ: 0 | max: 0</div>

<div id="bottom-panels">

  <!-- Left: Cognitive mode indicator -->
  <div id="cognitive-panel">
    <div id="cognitive-label">AI Cognitive Pipeline</div>
    <div class="cognitive-mode" id="mode-1">01 — PERCEPTION</div>
    <div class="cognitive-mode" id="mode-2">02 — CLASSIFICATION</div>
    <div class="cognitive-mode" id="mode-3">03 — RAG RETRIEVAL</div>
    <div class="cognitive-mode" id="mode-4">04 — TEMPORAL MEMORY</div>
    <div class="cognitive-mode" id="mode-5">05 — RELATIONAL REASONING</div>
    <div id="emotion-bar-panel">
      <div class="emotion-row">
        <div class="emotion-label">wonder</div>
        <div class="emotion-bar-bg"><div class="emotion-bar-fill" id="bar-wonder" style="background:#c9a84c"></div></div>
      </div>
      <div class="emotion-row">
        <div class="emotion-label">grief</div>
        <div class="emotion-bar-bg"><div class="emotion-bar-fill" id="bar-grief" style="background:#4a7c9e"></div></div>
      </div>
      <div class="emotion-row">
        <div class="emotion-label">anger</div>
        <div class="emotion-bar-bg"><div class="emotion-bar-fill" id="bar-anger" style="background:#c0392b"></div></div>
      </div>
      <div class="emotion-row">
        <div class="emotion-label">hope</div>
        <div class="emotion-bar-bg"><div class="emotion-bar-fill" id="bar-hope" style="background:#27ae60"></div></div>
      </div>
    </div>
  </div>

  <!-- Centre: Year reveal -->
  <div id="year-panel">
    <div id="year-reveal"></div>
    <div id="year-event"></div>
  </div>

  <!-- Right: Chronicle accumulates -->
  <div id="chronicle-panel">
    <div id="chronicle-label">The Chronicle</div>
    <div id="chronicle-entries"></div>
  </div>

</div>

<div id="transcript-panel">
  <div id="transcript-history"></div>
  <div id="transcript-partial"></div>
</div>

<div id="reflection-panel">
  <div id="reflection-text"></div>
</div>

<div id="finale-panel">
  <div id="finale-text"></div>
  <div id="finale-closing">Did we change?</div>
</div>

<div id="progress-bar"></div>

<script src="/solace-client.js"></script>
<script>
const BRIDGE_WS = 'ws://localhost:3001';
const FREQ_BINS = 128;
let eqFrames = 0;

// Transcript state — updated by onmessage, rendered by RAF loop
let pendingPartial = '';
let transcriptDirty = false;

const canvas = document.getElementById('c');
const c = canvas.getContext('2d');

let freqData = new Uint8Array(FREQ_BINS);
let timeData = new Uint8Array(FREQ_BINS);
let externalData = false;
let lastFrameTs = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  const s = document.getElementById('spotlight');
  s.style.left = e.clientX + 'px';
  s.style.top = e.clientY + 'px';
});

// --- EQ + transcript handlers (shared) ---
const wsStatus = document.getElementById('ws-status');

function handleEqPayload(payload) {
  const bars = payload.bars;
  if (!bars) return;
  const maxBar = Math.max(...bars);
  document.getElementById('eq-debug').textContent = `EQ: ${++eqFrames} | max: ${maxBar}`;
  const step = FREQ_BINS / bars.length;
  for (let i = 0; i < FREQ_BINS; i++) {
    freqData[i] = bars[Math.floor(i / step)] || 0;
  }
  const avg = bars.reduce((a, b) => a + b, 0) / bars.length;
  for (let i = 0; i < FREQ_BINS; i++) {
    timeData[i] = 128 + Math.round((Math.random() - 0.5) * avg * 0.4);
  }
  externalData = true;
  lastFrameTs = Date.now();
}

// Emotion weights per label keyword
const EMOTION_MAP = {
  wonder: ['wonder','awe','hopeful','visionary','amazement','pride'],
  grief:  ['grief','despair','sorrow','anguish','mourning','chaos','devastation'],
  anger:  ['anger','defiance','injustice','rage','resistance','fury'],
  hope:   ['hope','determination','transformation','change','renewal','redemption']
};

const emotionScores = { wonder: 0, grief: 0, anger: 0, hope: 0 };

function updateEmotionBars(emotionText) {
  if (!emotionText) return;
  const lower = emotionText.toLowerCase();
  Object.entries(EMOTION_MAP).forEach(([key, keywords]) => {
    if (keywords.some(k => lower.includes(k))) {
      emotionScores[key] = Math.min(100, emotionScores[key] + 30);
    } else {
      emotionScores[key] = Math.max(0, emotionScores[key] - 5);
    }
    document.getElementById(`bar-${key}`).style.width = emotionScores[key] + '%';
  });
}

function animateCognitiveModes(callback) {
  const modes = ['mode-1','mode-2','mode-3','mode-4','mode-5'];
  modes.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
  });
  let i = 0;
  function next() {
    if (i > 0) document.getElementById(modes[i-1]).classList.replace('active','done');
    if (i < modes.length) {
      document.getElementById(modes[i]).classList.add('active');
      i++;
      setTimeout(next, 380);
    } else {
      setTimeout(callback, 200);
    }
  }
  next();
}

function revealYear(year, event) {
  const yearEl = document.getElementById('year-reveal');
  const eventEl = document.getElementById('year-event');
  yearEl.classList.remove('visible');
  eventEl.style.opacity = '0';
  setTimeout(() => {
    yearEl.textContent = year || '';
    eventEl.textContent = event || '';
    if (year) {
      yearEl.classList.add('visible');
      setTimeout(() => { eventEl.style.opacity = '1'; }, 400);
    }
  }, 300);
}

function addChronicleEntry(payload) {
  const container = document.getElementById('chronicle-entries');
  // Fade all existing entries
  container.querySelectorAll('.chronicle-entry.visible')
    .forEach(el => el.classList.add('faded'));

  const entry = document.createElement('div');
  entry.className = 'chronicle-entry';
  entry.innerHTML = `
    <div class="ce-year">${payload.year || '—'}</div>
    <div class="ce-event">${payload.event || ''}</div>
    <div class="ce-insight">${payload.insight || ''}</div>
    ${payload.transcript ? `<div class="ce-heard"><span class="label">heard · </span>${payload.transcript}</div>` : ''}
    ${payload.ragContext ? `<div class="ce-rag"><span class="label">kb · </span>${payload.ragContext.substring(0, 120)}${payload.ragContext.length > 120 ? '…' : ''}</div>` : ''}
  `;
  container.appendChild(entry);

  // Keep last 4 entries
  const entries = container.querySelectorAll('.chronicle-entry');
  if (entries.length > 4) entries[0].remove();

  // Animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => entry.classList.add('visible'));
  });
}

function handleReflection(payload) {
  const panel = document.getElementById('reflection-panel');
  document.getElementById('reflection-text').textContent = payload.sentence || '';
  panel.classList.add('visible');
  // Hold for 6 seconds then fade out
  setTimeout(() => panel.classList.remove('visible'), 6000);
}

function handleFinale(payload) {
  const reflection = payload.reflection || '';
  // Split off the last line "Did we change?" if Claude included it
  const lines = reflection.replace(/Did we change\??\s*$/i, '').trim();
  document.getElementById('finale-text').textContent = lines;
  const panel = document.getElementById('finale-panel');
  panel.classList.add('visible');
  // Reveal "Did we change?" after 4 seconds
  setTimeout(() => {
    document.getElementById('finale-closing').classList.add('visible');
  }, 4000);
}

function handleChronicleEvent(payload) {
  // Animate cognitive pipeline first, then reveal results
  animateCognitiveModes(() => {
    revealYear(payload.year, payload.event);
    addChronicleEntry(payload);
    updateEmotionBars(payload.emotion);
  });
}

function handleTranscript(text, isFinal) {
  if (isFinal) {
    pendingPartial = '';
    const history = document.getElementById('transcript-history');
    const line = document.createElement('div');
    line.className = 'transcript-line';
    line.textContent = text;
    history.appendChild(line);
    const lines = history.querySelectorAll('.transcript-line');
    if (lines.length > 5) lines[0].remove();
    history.querySelectorAll('.transcript-line').forEach((el, i, arr) => {
      el.classList.toggle('old', i < arr.length - 1);
    });
  } else {
    pendingPartial = text;
  }
  transcriptDirty = true;
}

// --- Bridge WebSocket (local transport or transcript fallback) ---
function connectBridge() {
  const ws = new WebSocket(BRIDGE_WS);
  ws.onopen = () => {
    wsStatus.textContent = 'live';
    wsStatus.className = 'ok';
    document.getElementById('title').classList.add('playing');
    document.getElementById('subtitle').classList.add('playing');
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.topic === 'audio/equalizer' && msg.data) handleEqPayload(msg.data);
      else if (msg.topic === 'chronicle/transcript' && msg.data)
        handleTranscript(msg.data.text, msg.data.isFinal);
    } catch (_) {}
  };
  ws.onclose = () => {
    wsStatus.textContent = 'reconnecting...';
    wsStatus.className = 'err';
    externalData = false;
    setTimeout(connectBridge, 2000);
  };
  ws.onerror = () => { wsStatus.textContent = 'error'; wsStatus.className = 'err'; };
}

// --- Solace direct (transport=solace) ---
function connectSolace(cfg) {
  solace.SolclientFactory.init({ profile: solace.SolclientFactoryProfiles.version10 });
  const session = solace.SolclientFactory.createSession({
    url: cfg.url, vpnName: cfg.vpn, userName: cfg.username, password: cfg.password
  });
  session.on(solace.SessionEventCode.UP_NOTICE, () => {
    wsStatus.textContent = 'solace live';
    wsStatus.className = 'ok';
    document.getElementById('title').classList.add('playing');
    document.getElementById('subtitle').classList.add('playing');
    session.subscribe(
      solace.SolclientFactory.createTopicDestination('audio/equalizer'),
      true, 'audio/equalizer', 1000
    );
    session.subscribe(
      solace.SolclientFactory.createTopicDestination('chronicle/event'),
      true, 'chronicle/event', 1000
    );
    session.subscribe(
      solace.SolclientFactory.createTopicDestination('chronicle/reflection'),
      true, 'chronicle/reflection', 1000
    );
    session.subscribe(
      solace.SolclientFactory.createTopicDestination('chronicle/finale'),
      true, 'chronicle/finale', 1000
    );
  });
  session.on(solace.SessionEventCode.MESSAGE, (msg) => {
    try {
      const topic = msg.getDestination().getName();
      console.log('Solace message received, topic:', topic);
      // Bridge uses SDT container; CPI REST API uses binary attachment
      let raw;
      if (msg.getSdtContainer()) {
        raw = msg.getSdtContainer().getValue();
      } else if (msg.getBinaryAttachment()) {
        const bin = msg.getBinaryAttachment();
        raw = typeof bin === 'string' ? bin : new TextDecoder().decode(bin);
      }
      console.log('Solace raw message:', raw);
      const payload = JSON.parse(raw);
      if (topic === 'audio/equalizer') {
        handleEqPayload(payload);
      } else if (topic === 'chronicle/event') {
        handleChronicleEvent(payload);
      } else if (topic === 'chronicle/reflection') {
        handleReflection(payload);
      } else if (topic === 'chronicle/finale') {
        handleFinale(payload);
      }
    } catch (e) { console.error('Solace message error:', e); }
  });
  session.on(solace.SessionEventCode.CONNECT_FAILED_ERROR, (e) => {
    wsStatus.textContent = 'solace error';
    wsStatus.className = 'err';
    console.error('Solace consumer error:', e.infoStr);
  });

  session.on(solace.SessionEventCode.SUBSCRIPTION_OK, (e) => {
    console.log('Solace subscription OK:', e.correlationKey);
  });

  session.on(solace.SessionEventCode.SUBSCRIPTION_ERROR, (e) => {
    console.error('Solace subscription ERROR:', e.correlationKey, e.infoStr);
  });
  session.connect();
}

// --- Bootstrap ---
async function bootstrap() {
  try {
    const cfg = await fetch('/solace-config').then(r => r.json());
    if (cfg.transport === 'solace') {
      connectSolace(cfg);  // EQ direct from Solace
      connectBridge();      // transcripts still via bridge until CAP is built
    } else {
      connectBridge();
    }
  } catch (e) {
    connectBridge();
  }
}

bootstrap();

// ============ VISUALIZER ============

let hue = 0;
let prevEnergy = 0;
let beatPulse = 0;
const particles = [];
const PARTICLE_COUNT = 180;

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    size: Math.random() * 2 + 0.5,
    hue: Math.random() * 40 + 20,
  });
}

function getEnergy(data, lo, hi) {
  let sum = 0;
  for (let i = lo; i < hi; i++) sum += data[i];
  return sum / (hi - lo) / 255;
}

function draw() {
  requestAnimationFrame(draw);

  // Flush transcript updates every frame — renders regardless of tab focus
  if (transcriptDirty) {
    document.getElementById('transcript-partial').textContent = pendingPartial;
    transcriptDirty = false;
  }

  const w = canvas.width, h = canvas.height;

  // If no external data for >1s, treat as idle
  const idle = !externalData || (Date.now() - lastFrameTs > 1000);

  if (idle) {
    c.fillStyle = 'rgba(0,0,0,0.15)';
    c.fillRect(0, 0, w, h);
    drawIdleParticles(w, h);
    return;
  }

  const bass = getEnergy(freqData, 0, 10);
  const mid  = getEnergy(freqData, 10, 80);
  const high = getEnergy(freqData, 80, FREQ_BINS);
  const energy = bass * 0.6 + mid * 0.3 + high * 0.1;

  const isBeat = energy > prevEnergy * 1.3 && energy > 0.15;
  if (isBeat) beatPulse = 1;
  beatPulse *= 0.92;
  prevEnergy = energy * 0.8 + prevEnergy * 0.2;

  c.fillStyle = `rgba(0,0,0,${0.25 + bass * 0.1})`;
  c.fillRect(0, 0, w, h);

  // ---- FLOOR REFLECTION ----
  const floorY = h * 0.72;
  const barCount = FREQ_BINS;
  const barW = w / barCount;

  for (let i = 0; i < barCount; i++) {
    const val = freqData[i] / 255;
    const barH = val * h * 0.45;
    const x = i * barW;
    const hueShift = (i / barCount) * 60 + hue;
    const sat = 60 + val * 40;
    const lit = 30 + val * 40;

    const grad = c.createLinearGradient(x, floorY, x, floorY - barH);
    grad.addColorStop(0, `hsla(${hueShift}, ${sat}%, ${lit}%, 0.9)`);
    grad.addColorStop(0.6, `hsla(${hueShift + 20}, ${sat}%, ${lit + 20}%, 0.6)`);
    grad.addColorStop(1, `hsla(${hueShift + 40}, 100%, 85%, 0.0)`);
    c.fillStyle = grad;
    c.fillRect(x, floorY - barH, barW - 1, barH);

    const reflGrad = c.createLinearGradient(x, floorY, x, floorY + barH * 0.4);
    reflGrad.addColorStop(0, `hsla(${hueShift}, ${sat}%, ${lit}%, 0.3)`);
    reflGrad.addColorStop(1, `hsla(${hueShift}, ${sat}%, ${lit}%, 0)`);
    c.fillStyle = reflGrad;
    c.fillRect(x, floorY, barW - 1, barH * 0.4);
  }

  c.strokeStyle = `rgba(201,168,76,${0.1 + bass * 0.3})`;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(0, floorY);
  c.lineTo(w, floorY);
  c.stroke();

  // ---- WAVEFORM ----
  c.beginPath();
  c.lineWidth = 1.5;
  c.strokeStyle = `rgba(255,255,255,${0.08 + mid * 0.15})`;
  for (let i = 0; i < timeData.length; i++) {
    const x = (i / timeData.length) * w;
    const y = floorY - 60 + ((timeData[i] / 128) - 1) * 40;
    i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  }
  c.stroke();

  // ---- SPOTLIGHT BEAMS ----
  for (let b = 0; b < 6; b++) {
    const angle = (b / 6) * Math.PI + Math.sin(Date.now() * 0.0003 + b) * 0.3;
    const intensity = (freqData[b * 15] / 255) * 0.12 + 0.02;
    const bx = w * 0.1 + (b / 6) * w * 0.8;

    c.save();
    c.translate(bx, 0);
    c.rotate(angle - Math.PI / 2);
    const beamGrad = c.createLinearGradient(0, 0, 0, h * 0.8);
    beamGrad.addColorStop(0, `rgba(255,240,180,${intensity * 2})`);
    beamGrad.addColorStop(0.3, `rgba(255,240,180,${intensity})`);
    beamGrad.addColorStop(1, `rgba(255,240,180,0)`);
    c.fillStyle = beamGrad;
    c.beginPath();
    c.moveTo(0, 0);
    c.lineTo(-20 - bass * 40, h * 0.8);
    c.lineTo(20 + bass * 40, h * 0.8);
    c.closePath();
    c.fill();
    c.restore();
  }

  // ---- BEAT PULSE RING ----
  if (beatPulse > 0.1) {
    c.beginPath();
    c.arc(w / 2, floorY, beatPulse * w * 0.4, 0, Math.PI * 2);
    c.strokeStyle = `rgba(201,168,76,${beatPulse * 0.4})`;
    c.lineWidth = beatPulse * 3;
    c.stroke();
  }

  // ---- PARTICLES ----
  for (const p of particles) {
    p.x += p.vx * (1 + energy * 3);
    p.y += p.vy * (1 + energy * 3);
    if (p.x < 0) p.x = w;
    if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h;
    if (p.y > h) p.y = 0;
    const brightness = 40 + energy * 60;
    c.beginPath();
    c.arc(p.x, p.y, p.size * (1 + bass * 2), 0, Math.PI * 2);
    c.fillStyle = `hsla(${p.hue + hue},80%,${brightness}%,${0.3 + energy * 0.5})`;
    c.fill();
  }

  // ---- CENTER GLOW ----
  const glowR = 80 + energy * 200 + beatPulse * 150;
  const glow = c.createRadialGradient(w/2, floorY, 0, w/2, floorY, glowR);
  glow.addColorStop(0, `rgba(201,168,76,${0.08 + energy * 0.15})`);
  glow.addColorStop(1, 'rgba(201,168,76,0)');
  c.fillStyle = glow;
  c.fillRect(0, 0, w, h);

  hue = (hue + 0.08) % 360;
}

function drawIdleParticles(w, h) {
  hue = (hue + 0.05) % 360;
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = w;
    if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h;
    if (p.y > h) p.y = 0;
    c.beginPath();
    c.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    c.fillStyle = `hsla(${p.hue + hue},60%,50%,0.15)`;
    c.fill();
  }
}

draw();
</script>
