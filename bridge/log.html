<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MJ Live — Session Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #ccc;
    font-family: 'Cormorant Garamond', serif;
    padding: 32px 40px;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 1px solid #1e1e1e;
    padding-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 8px;
    color: #c9a84c;
  }

  .subtitle {
    font-style: italic;
    font-size: 13px;
    color: #444;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    align-items: center;
    flex-wrap: wrap;
  }

  input {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    color: #ccc;
    padding: 9px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #c9a84c; }
  input::placeholder { color: #333; }

  button {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 13px;
    padding: 9px 20px;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
  }
  .btn-refresh { background: #c9a84c; color: #000; }
  .btn-refresh:hover { background: #e0c060; }
  .btn-reset { background: #1e1e1e; color: #c0392b; border: 1px solid #2a2a2a; }
  .btn-reset:hover { background: #2a1515; }

  #count { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #444; margin-left: 4px; }

  /* Cards */
  #cards { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: #0f0f0f;
    border: 1px solid #1a1a1a;
    border-radius: 3px;
    display: grid;
    grid-template-columns: 4px 1fr;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #2a2a2a; }

  .act-bar { width: 4px; }
  .act-1 .act-bar { background: #c9a84c; }
  .act-2 .act-bar { background: #c0392b; }
  .act-3 .act-bar { background: #4a7c9e; }
  .act-4 .act-bar { background: #27ae60; }
  .act-0 .act-bar { background: #2a2a2a; }

  .card-body { padding: 16px 20px; }

  .card-top {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
  }

  .emotion-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    background: #1a1a1a;
    color: #e67e22;
    border: 1px solid #2a2010;
  }

  .act-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    margin-left: auto;
  }

  .ts-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #333;
  }

  .event {
    font-size: 17px;
    font-weight: 600;
    color: #eee;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .insight {
    font-style: italic;
    font-size: 14px;
    color: #c9a84c;
    line-height: 1.5;
    margin-bottom: 12px;
    padding-left: 12px;
    border-left: 2px solid #2a2010;
  }

  .card-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #1a1a1a;
  }

  .footer-block { display: flex; flex-direction: column; gap: 3px; }

  .footer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #333;
  }

  .heard-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #666;
    line-height: 1.4;
  }

  .rag-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #336699;
    line-height: 1.4;
  }

  .geo-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #3a5a3a;
  }

  .empty {
    text-align: center;
    padding: 80px 40px;
    color: #222;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 6px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>MJ Live — Session Log</h1>
    <div class="subtitle">what the AI heard · what it retrieved · what it understood</div>
  </div>
</header>

<div class="controls">
  <button class="btn-refresh" onclick="load()">REFRESH</button>
  <button class="btn-reset" onclick="resetSession()">RESET SESSION</button>
  <input type="text" id="filter" placeholder="filter by transcript, emotion, year, event..." oninput="render()">
  <span id="count"></span>
</div>

<div id="cards"></div>

<script>
let allRows = [];

const ACT_NAMES = { 1: 'Act 1 — Wonder', 2: 'Act 2 — Anger', 3: 'Act 3 — Grief', 4: 'Act 4 — Hope' };

async function load() {
  document.getElementById('count').textContent = 'loading...';
  try {
    const res = await fetch('/session-log');
    allRows = await res.json();
    render();
  } catch (e) {
    document.getElementById('cards').innerHTML = `<div class="empty">ERROR — ${e.message}</div>`;
  }
}

function render() {
  const q = document.getElementById('filter').value.toLowerCase();
  const rows = q ? allRows.filter(r =>
    (r.transcript||'').toLowerCase().includes(q) ||
    (r.emotion||'').toLowerCase().includes(q) ||
    String(r.year||'').includes(q) ||
    (r.event||'').toLowerCase().includes(q)
  ) : allRows;

  document.getElementById('count').textContent = `${rows.length} event${rows.length !== 1 ? 's' : ''}`;

  if (rows.length === 0) {
    document.getElementById('cards').innerHTML = `<div class="empty">NO EVENTS YET — start the demo or call /test-chronicle</div>`;
    return;
  }

  document.getElementById('cards').innerHTML = rows.map(r => {
    const act = r.actNumber || 0;
    const ts = r.ts ? new Date(r.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
    const rag = (r.ragContext || '').substring(0, 220) + (r.ragContext?.length > 220 ? '…' : '');
    const geo = r.country ? `${r.country}${r.lat ? `  ${Number(r.lat).toFixed(4)}, ${Number(r.lng).toFixed(4)}` : ''}` : '';

    return `
    <div class="card act-${act}">
      <div class="act-bar"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="year">${r.year || '—'}</div>
          ${r.emotion ? `<div class="emotion-badge">${r.emotion}</div>` : ''}
          <div class="act-label">${ACT_NAMES[act] || ''}</div>
          <div class="ts-label">${ts}</div>
        </div>
        <div class="event">${r.event || '—'}</div>
        ${r.insight ? `<div class="insight">${r.insight}</div>` : ''}
        <div class="card-footer">
          <div class="footer-block">
            <div class="footer-label">heard</div>
            <div class="heard-text">${r.transcript || '—'}</div>
          </div>
          <div class="footer-block">
            <div class="footer-label">kb retrieved</div>
            <div class="rag-text">${rag || '—'}</div>
          </div>
          ${geo ? `<div class="footer-block">
            <div class="footer-label">location</div>
            <div class="geo-text">${geo}</div>
          </div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function resetSession() {
  if (!confirm('Reset session memory on CAP? This clears the AI emotional arc and key figures.')) return;
  try {
    await fetch('/reset-session', { method: 'POST' });
    allRows = [];
    render();
  } catch (e) {
    alert('Reset failed: ' + e.message);
  }
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
