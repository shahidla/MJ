<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MJ Live — Session Log</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #e0e0e0;
    font-family: 'Cormorant Garamond', serif;
    padding: 32px 40px;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    border-bottom: 1px solid #21262d;
    padding-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 8px;
    color: #e3b341;
  }

  .subtitle {
    font-style: italic;
    font-size: 14px;
    color: #6b7280;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    align-items: center;
    flex-wrap: wrap;
  }

  input {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 9px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    width: 300px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #e3b341; }
  input::placeholder { color: #484f58; }

  button {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 13px;
    padding: 9px 22px;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .btn-refresh { background: #e3b341; color: #000; }
  .btn-refresh:hover { background: #f0c84a; }
  .btn-reset { background: #161b22; color: #f85149; border: 1px solid #30363d; }
  .btn-reset:hover { background: #2a1515; }
  .btn-all { background: #161b22; color: #6b7280; border: 1px solid #30363d; }
  .btn-all:hover { background: #1f2937; }
  .btn-clear { background: #2a0a0a; color: #f85149; border: 1px solid #4a1010; }
  .btn-clear:hover { background: #3a1010; }

  #count { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #6b7280; margin-left: 4px; }

  /* Cards */
  #cards { display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 6px;
    display: grid;
    grid-template-columns: 5px 1fr;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover { border-color: #30363d; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }

  .act-bar { width: 5px; }
  .act-1 .act-bar { background: #e3b341; }
  .act-2 .act-bar { background: #f85149; }
  .act-3 .act-bar { background: #58a6ff; }
  .act-4 .act-bar { background: #3fb950; }
  .act-0 .act-bar { background: #30363d; }

  .card-body { padding: 18px 22px; }

  .card-top {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    color: #f0f6fc;
    line-height: 1;
  }

  .emotion-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 12px;
    background: #1f1d0e;
    color: #e3a436;
    border: 1px solid #3d3210;
  }

  .act-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #6b7280;
    letter-spacing: 1px;
    margin-left: auto;
  }

  .ts-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #484f58;
  }

  .event {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .insight {
    font-style: italic;
    font-size: 15px;
    color: #e3b341;
    line-height: 1.6;
    margin-bottom: 14px;
    padding-left: 14px;
    border-left: 2px solid #3d3210;
  }

  .card-footer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #21262d;
  }

  .footer-block { display: flex; flex-direction: column; gap: 4px; }

  .footer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #484f58;
  }

  .heard-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #8b949e;
    line-height: 1.5;
  }

  .rag-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #58a6ff;
    line-height: 1.5;
  }

  .geo-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #3fb950;
  }

  .empty {
    text-align: center;
    padding: 80px 40px;
    color: #30363d;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 6px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>MJ Live — Session Log</h1>
    <div class="subtitle">what the AI heard · what it retrieved · what it understood</div>
  </div>
</header>

<div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;">
  <input type="text" id="inject-text" placeholder="paste a sentence → PERCEPTION + pipeline..." style="background:#161b22;border:1px solid #30363d;border-radius:4px;color:#e0e0e0;padding:9px 14px;font-family:'Share Tech Mono',monospace;font-size:12px;flex:1;outline:none;" onkeydown="if(event.key==='Enter')injectText()">
  <button onclick="injectText()" style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:13px;padding:9px 22px;border:none;cursor:pointer;border-radius:4px;background:#58a6ff;color:#000;">INJECT</button>
</div>

<div class="controls">
  <button class="btn-refresh" onclick="refresh()">REFRESH</button>
  <button class="btn-clear" onclick="deleteAll()">DELETE</button>
  <button class="btn-all" id="btn-all" onclick="toggleAll()">SHOW ALL</button>
  <input type="text" id="filter" placeholder="filter by transcript, emotion, year, event..." oninput="render()">
  <span id="count"></span>
  <span id="session-id" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#484f58;margin-left:8px;"></span>
</div>

<!-- Tabs -->
<div style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid #21262d;">
  <button id="tab-events" onclick="switchTab('events')" style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:13px;padding:10px 24px;border:none;cursor:pointer;background:none;color:#e3b341;border-bottom:2px solid #e3b341;margin-bottom:-1px;">CHRONICLE EVENTS</button>
  <button id="tab-cap" onclick="switchTab('cap')" style="font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:13px;padding:10px 24px;border:none;cursor:pointer;background:none;color:#484f58;border-bottom:2px solid transparent;margin-bottom:-1px;">CAP CALLS THIS SESSION <span id="cap-count" style="font-size:10px;"></span></button>
</div>

<div id="tab-events-content">
  <div id="cards"></div>
</div>

<div id="tab-cap-content" style="display:none;">
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <button onclick="clearCapLog()" style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:11px;padding:4px 12px;border:1px solid #4a1010;background:#2a0a0a;color:#f85149;border-radius:4px;cursor:pointer;">CLEAR</button>
  </div>
  <div id="cpi-cards" style="display:flex;flex-direction:column;gap:6px;"></div>
</div>

<script>
let allRows = [];
let currentSessionId = null;
let showAll = false;
let activeTab = 'events';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-events-content').style.display = tab === 'events' ? '' : 'none';
  document.getElementById('tab-cap-content').style.display   = tab === 'cap'    ? '' : 'none';
  document.getElementById('tab-events').style.color       = tab === 'events' ? '#e3b341' : '#484f58';
  document.getElementById('tab-events').style.borderBottomColor = tab === 'events' ? '#e3b341' : 'transparent';
  document.getElementById('tab-cap').style.color          = tab === 'cap'    ? '#e3b341' : '#484f58';
  document.getElementById('tab-cap').style.borderBottomColor    = tab === 'cap'    ? '#e3b341' : 'transparent';
}

const ACT_NAMES = { 1: 'Act 1 — Wonder', 2: 'Act 2 — Anger', 3: 'Act 3 — Grief', 4: 'Act 4 — Hope' };

async function load() {
  document.getElementById('count').textContent = 'loading...';
  try {
    if (!currentSessionId) {
      const s = await fetch('/current-session').then(r => r.json());
      currentSessionId = s.sessionId;
      document.getElementById('session-id').textContent = `session: ${currentSessionId}`;
    }
    const url = showAll ? '/session-log' : `/session-log?sessionId=${currentSessionId}`;
    const res = await fetch(url);
    allRows = await res.json();
    render();
  } catch (e) {
    document.getElementById('cards').innerHTML = `<div class="empty">ERROR — ${e.message}</div>`;
  }
}

function toggleAll() {
  showAll = !showAll;
  document.getElementById('btn-all').textContent = showAll ? 'CURRENT SESSION' : 'SHOW ALL';
  load();
}

function render() {
  const q = document.getElementById('filter').value.toLowerCase();
  const filtered = q ? allRows.filter(r =>
    (r.transcript||'').toLowerCase().includes(q) ||
    (r.emotion||'').toLowerCase().includes(q) ||
    String(r.year||'').includes(q) ||
    (r.event||'').toLowerCase().includes(q)
  ) : allRows;

  const rows = [...filtered].reverse(); // newest first
  document.getElementById('count').textContent = `${rows.length} event${rows.length !== 1 ? 's' : ''}  · refresh 4s`;

  if (rows.length === 0) {
    document.getElementById('cards').innerHTML = `<div class="empty">NO EVENTS YET — start the demo or call /test-chronicle</div>`;
    return;
  }

  document.getElementById('cards').innerHTML = rows.map(r => {
    const act = r.actNumber || 0;
    const ts = r.ts ? new Date(r.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
    const ragRecords = (r.ragContext || '').split('\n\n').map(s => s.trim()).filter(Boolean);
    const geo = r.country ? `${r.country}${r.lat ? `  ${Number(r.lat).toFixed(4)}, ${Number(r.lng).toFixed(4)}` : ''}` : '';

    return `
    <div class="card act-${act}">
      <div class="act-bar"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="year">${r.year || '—'}</div>
          ${r.emotion ? `<div class="emotion-badge">${r.emotion}</div>` : ''}
          <div class="act-label">${ACT_NAMES[act] || ''}</div>
          <div class="ts-label">${ts}</div>
        </div>
        <div class="event">${r.event || '—'}</div>
        ${r.figure ? `<div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#c9a84c;letter-spacing:1px;margin-bottom:6px;">figure: ${r.figure}</div>` : ''}
        ${r.insight ? `<div class="insight">${r.insight}</div>` : ''}
        <div class="card-footer">
          <div class="footer-block">
            <div class="footer-label">heard (full)</div>
            <div class="heard-text" style="white-space:pre-wrap;word-break:break-word;">${r.transcript || '—'}</div>
          </div>
          <div class="footer-block">
            <div class="footer-label">claude response</div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:11px;line-height:1.6;">
              <span style="color:#6b7280;">emotion</span> <span style="color:#e3b341;">${r.emotion || '—'}</span>
              &nbsp;·&nbsp;<span style="color:#6b7280;">year</span> <span style="color:#58a6ff;">${r.year || '—'}</span>
              ${r.figure ? `&nbsp;·&nbsp;<span style="color:#6b7280;">figure</span> <span style="color:#c9a84c;">${r.figure}</span>` : ''}
            </div>
          </div>
          <div class="footer-block" style="grid-column:1/-1;">
            <div class="footer-label">kb retrieved (${ragRecords.length})</div>
            ${ragRecords.length === 0 ? '<div class="rag-text">—</div>' :
              ragRecords.map(rec => {
                const match = rec.match(/^(\d{4}):\s*(.+?)(?:\s*—\s*(.+))?$/s);
                const year = match ? match[1] : '—';
                const headline = match ? match[2] : rec.substring(0, 60);
                return `<div style="background:#0d1117;border:1px solid #21262d;border-radius:4px;padding:6px 10px;margin-top:4px;">
                  <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#e3b341;letter-spacing:2px;">${year}</span>
                  <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#58a6ff;margin-left:8px;">${headline}</span>
                </div>`;
              }).join('')
            }
          </div>
          ${geo ? `<div class="footer-block">
            <div class="footer-label">location</div>
            <div class="geo-text">${geo}</div>
          </div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function refresh() {
  currentSessionId = null; // force re-fetch of session ID in case CAP restarted
  await load();
}

async function deleteAll() {
  try {
    await Promise.all([
      fetch('/clear-chronicle', { method: 'POST' }),
      fetch('/reset-session', { method: 'POST' }),
      fetch('/clear-cap-log', { method: 'POST' })
    ]);
    currentSessionId = null;
    allRows = [];
    document.getElementById('cpi-cards').innerHTML = '';
    render();
    await load(); // re-fetch current session ID
  } catch (e) {
    console.error('Delete failed:', e.message);
  }
}

async function clearCapLog() {
  await fetch('/clear-cap-log', { method: 'POST' });
  document.getElementById('cpi-cards').innerHTML = '';
}

async function loadCpiLog() {
  try {
    const rows = await fetch('/cap-log').then(r => r.json());
    const rev = [...rows].reverse(); // newest first
    document.getElementById('cap-count').textContent = rows.length ? `(${rows.length})` : '';
    document.getElementById('cpi-cards').innerHTML = rev.length === 0
      ? '<div style="color:#30363d;font-family:\'Share Tech Mono\',monospace;font-size:11px;">no CAP calls yet</div>'
      : rev.map(r => `
        <div style="background:#161b22;border:1px solid ${r.status==='ok'?'#238636':'#f85149'};border-radius:4px;padding:8px 14px;display:flex;gap:16px;align-items:baseline;">
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#484f58;">${new Date(r.ts).toLocaleTimeString()}</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:${r.status==='ok'?'#3fb950':'#f85149'};min-width:60px;">${r.status||'pending'}</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:13px;color:#8b949e;">${r.transcript}</span>
        </div>`).join('');
  } catch(e) {}
}

async function injectText() {
  const input = document.getElementById('inject-text');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    await fetch('/inject', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    setTimeout(load, 3000); // reload log after pipeline has time to process
  } catch (e) { alert('Inject failed: ' + e.message); }
}

load();
loadCpiLog();
setInterval(load, 4000);
setInterval(loadCpiLog, 3000);
</script>
</body>
</html>
