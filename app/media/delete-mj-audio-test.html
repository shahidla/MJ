<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>MJ audio tap test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 1rem;
        }

        #log {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 0.5rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        #mj-eq-canvas {
            width: 100%;
            max-width: 600px;
            height: 140px;
            border: 1px solid #ccc;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <h1>MJ audio tap test</h1>
    <p>
        This page plays the MJ MP3 and uses Web Audio to capture chunks.
        For now we only log chunk sizes.
    </p>

    <audio id="mj-audio" controls>
        <source src="/media/billie-jean.mp3" type="audio/mpeg" />
        Your browser needs audio support
    </audio>

    <!-- Equaliser canvas -->
    <canvas id="mj-eq-canvas" width="600" height="140"></canvas>

    <div id="log"></div>

    <script>
        const audioEl = document.getElementById("mj-audio");
        const logEl = document.getElementById("log");
        const eqCanvas = document.getElementById("mj-eq-canvas");

        function log(msg) {
            console.log(msg);
            logEl.textContent += msg + "\n";
        }

        let audioContext;
        let workletNode;
        let analyser;
        let eqAnimationId;

        function startEqualizer() {
            if (!analyser || !eqCanvas) {
                log("Equalizer: missing analyser or canvas");
                return;
            }

            const canvasCtx = eqCanvas.getContext("2d");
            const width = eqCanvas.width;
            const height = eqCanvas.height;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            const barCount = 48;
            const step = Math.max(1, Math.floor(bufferLength / barCount));

            function draw() {
                eqAnimationId = requestAnimationFrame(draw);

                analyser.getByteFrequencyData(dataArray);

                canvasCtx.clearRect(0, 0, width, height);

                const barWidth = width / barCount;

                for (let i = 0; i < barCount; i++) {
                    const value = dataArray[i * step] || 0;
                    const barHeight = (value / 255) * height;

                    const x = i * barWidth;
                    const y = height - barHeight;

                    canvasCtx.fillRect(x, y, barWidth * 0.7, barHeight);
                }
            }

            if (!eqAnimationId) {
                draw();
                log("Equalizer started");
            }
        }

        async function initAudioTap() {
            audioContext = new AudioContext({ sampleRate: 16000 });

            await audioContext.audioWorklet.addModule("/mj-audio-worklet.js");

            const sourceNode = audioContext.createMediaElementSource(audioEl);
            workletNode = new AudioWorkletNode(
                audioContext,
                "mj-pcm-logger-worklet"
            );

            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            // audio chain: audio element -> worklet -> analyser -> speakers
            sourceNode.connect(workletNode);
            workletNode.connect(analyser);
            analyser.connect(audioContext.destination);

            workletNode.port.onmessage = async (event) => {
                const pcm16 = event.data; // Int16Array
                log("Chunk length: " + pcm16.length + " samples");

                // send to CAP as raw bytes
                const blob = new Blob([pcm16.buffer], {
                    type: "application/octet-stream"
                });

                try {
                    await fetch("/mj/audio-debug", {
                        method: "POST",
                        body: blob
                    });
                } catch (e) {
                    console.error("Send audio error", e);
                    log("Send audio error: " + e.message);
                }
            };

            log("Audio tap initialised");
            startEqualizer();
        }

        audioEl.addEventListener("play", async () => {
            if (!audioContext) {
                await initAudioTap();
            }
            if (audioContext.state === "suspended") {
                await audioContext.resume();
            }
        });

        log("Ready. Press play on the audio control.");
    </script>
</body>

</html>
