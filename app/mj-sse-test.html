<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>MJ SSE test</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 1rem;
    }

    #log {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 0.5rem;
      margin-top: 1rem;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
</head>

<body>
  <h1>MJ SSE stream</h1>
  <p>This page listens to /mj/stream and prints events.</p>

  <div id="log"></div>

  <script>
    const logEl = document.getElementById("log");

    function log(msg) {
      console.log(msg);
      logEl.textContent += msg + "\n";
    }

    log("Connecting to MJ SSE stream ...");

    const es = new EventSource("/mj/stream");

    es.onopen = () => {
      log("SSE connection opened");
    };

    es.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        log("Event: " + JSON.stringify(data));
      } catch (e) {
        log("Raw event: " + event.data);
      }
    };

    es.onerror = (err) => {
      log("SSE error " + err);
    };
  </script>
</body>

</html>
