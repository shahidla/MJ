<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ — AI Visual Intelligence Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --white: #f0ece0;
    --black: #080808;
    --red: #8b1a1a;
    --blue: #1a2a4a;
    --transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 340px;
  }

  /* MAIN VISUAL STAGE */
  #stage {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #bg-layer {
    position: absolute;
    inset: 0;
    transition: background var(--transition), opacity var(--transition);
    z-index: 0;
  }

  #particles {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  #year-display {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  #year-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(120px, 20vw, 280px);
    line-height: 0.85;
    letter-spacing: -2px;
    color: var(--white);
    text-shadow: 0 0 80px currentColor;
    transition: all var(--transition);
    opacity: 0;
    transform: scale(0.8) translateY(20px);
  }

  #year-number.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  #event-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(16px, 2vw, 24px);
    font-weight: 300;
    color: var(--gold);
    margin-top: 16px;
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.8s ease 0.4s;
    max-width: 500px;
    line-height: 1.6;
  }

  #event-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  #emotion-badge {
    position: absolute;
    top: 32px;
    left: 32px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .emotion-label {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
  }

  #emotion-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    transition: all 0.6s ease;
  }

  #emotion-bar-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
  }

  .ebar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ebar-label {
    font-size: 8px;
    letter-spacing: 2px;
    width: 60px;
    opacity: 0.5;
    text-transform: uppercase;
  }

  .ebar-track {
    width: 80px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .ebar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  /* AI PANEL */
  #ai-panel {
    background: rgba(255,255,255,0.02);
    border-left: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    gap: 0;
    overflow: hidden;
  }

  .panel-section {
    padding: 24px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .panel-section:last-child { border-bottom: none; flex: 1; }

  .panel-label {
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 12px;
  }

  /* AI Thinking Stream */
  #ai-thinking {
    font-size: 11px;
    line-height: 1.8;
    color: rgba(240,236,224,0.5);
    font-family: 'Space Mono', monospace;
  }

  #ai-thinking .ai-line {
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.4s ease;
    margin-bottom: 4px;
  }

  #ai-thinking .ai-line.show {
    opacity: 1;
    transform: translateX(0);
  }

  #ai-thinking .ai-line.active {
    color: var(--white);
    opacity: 1;
  }

  #ai-thinking .ai-line.dim {
    opacity: 0.2;
  }

  /* Decision output */
  #ai-decision {
    font-size: 12px;
    line-height: 1.7;
    color: var(--white);
  }

  #ai-decision strong {
    color: var(--gold);
    font-weight: normal;
  }

  /* Timeline */
  #timeline {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .timeline-item {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.5s ease;
  }

  .timeline-item.show {
    opacity: 1;
    transform: translateY(0);
  }

  .tl-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--gold);
    width: 48px;
    flex-shrink: 0;
    line-height: 1.2;
  }

  .tl-dot {
    width: 1px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
    position: relative;
  }

  .tl-dot::before {
    content: '';
    position: absolute;
    top: 6px;
    left: -3px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
  }

  .tl-event {
    font-size: 10px;
    line-height: 1.6;
    color: rgba(240,236,224,0.6);
    padding-top: 2px;
  }

  /* Controls */
  #controls {
    position: absolute;
    bottom: 32px;
    right: 32px;
    z-index: 20;
    display: flex;
    gap: 12px;
  }

  button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }

  button.active {
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }

  /* MJ signature */
  #mj-signature {
    position: absolute;
    top: 32px;
    right: 32px;
    z-index: 20;
    text-align: right;
  }

  #mj-signature .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 6px;
    opacity: 0.3;
  }

  #mj-signature .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--gold);
    opacity: 0.5;
    letter-spacing: 2px;
  }

  canvas { position: absolute; inset: 0; z-index: 2; }
</style>
</head>
<body>

<div id="stage">
  <div id="bg-layer"></div>
  <canvas id="particles"></canvas>

  <div id="emotion-badge">
    <span class="emotion-label">AI Detected Emotion</span>
    <span id="emotion-name">—</span>
    <div id="emotion-bar-container">
      <div class="ebar-row">
        <span class="ebar-label">Grief</span>
        <div class="ebar-track"><div class="ebar-fill" id="bar-grief" style="width:0%"></div></div>
      </div>
      <div class="ebar-row">
        <span class="ebar-label">Power</span>
        <div class="ebar-track"><div class="ebar-fill" id="bar-power" style="width:0%"></div></div>
      </div>
      <div class="ebar-row">
        <span class="ebar-label">Hope</span>
        <div class="ebar-track"><div class="ebar-fill" id="bar-hope" style="width:0%"></div></div>
      </div>
      <div class="ebar-row">
        <span class="ebar-label">Rage</span>
        <div class="ebar-track"><div class="ebar-fill" id="bar-rage" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div id="mj-signature">
    <div class="name">Michael Jackson</div>
    <div class="subtitle">HIStory — Real Time AI</div>
  </div>

  <div id="year-display">
    <div id="year-number"></div>
    <div id="event-text"></div>
  </div>

  <div id="controls">
    <button id="btn-start" class="active">▶ Start Demo</button>
    <button id="btn-reset">↺ Reset</button>
  </div>
</div>

<div id="ai-panel">
  <div class="panel-section">
    <div class="panel-label">AI Reasoning Stream</div>
    <div id="ai-thinking"></div>
  </div>

  <div class="panel-section">
    <div class="panel-label">AI Visual Decision</div>
    <div id="ai-decision">Waiting for audio signal...</div>
  </div>

  <div class="panel-section" style="flex:1; display:flex; flex-direction:column;">
    <div class="panel-label">Chronicle Built</div>
    <div id="timeline"></div>
  </div>
</div>

<script>
const MOMENTS = [
  {
    year: "1945",
    event: "World War II ends. Humanity exhales after six years of devastation.",
    emotion: "GRIEF",
    scores: { grief: 85, power: 40, hope: 60, rage: 30 },
    bg: "radial-gradient(ellipse at center, #1a0a0a 0%, #080808 70%)",
    particleColor: "#8b1a1a",
    thinking: [
      "> analyzing vocal pitch...",
      "> low register detected",
      "> tempo: 58bpm — dirge-like",
      "> semantic: 'war', 'death', 'end'",
      "> emotion classification: GRIEF",
      "> selecting visual palette: deep crimson",
      "> particle behavior: slow, falling"
    ],
    decision: "<strong>Emotion:</strong> Grief<br><strong>Palette:</strong> Deep crimson, near-black<br><strong>Particles:</strong> Slow descent, 0.3 opacity<br><strong>Typography:</strong> Heavy, weighted"
  },
  {
    year: "1968",
    event: "Martin Luther King Jr. assassinated. A dream interrupted but never silenced.",
    emotion: "RAGE",
    scores: { grief: 70, power: 90, hope: 20, rage: 95 },
    bg: "radial-gradient(ellipse at 30% 50%, #2a0a00 0%, #080808 60%)",
    particleColor: "#ff4400",
    thinking: [
      "> vocal intensity spiking...",
      "> harmonic distortion detected",
      "> BPM surge: 82 → 94",
      "> semantic: 'shot', 'silenced', 'injustice'",
      "> emotion classification: RAGE",
      "> selecting visual palette: burnt orange",
      "> particle behavior: explosive, chaotic"
    ],
    decision: "<strong>Emotion:</strong> Rage<br><strong>Palette:</strong> Burnt orange, ash black<br><strong>Particles:</strong> Explosive burst, high velocity<br><strong>Typography:</strong> Violent impact"
  },
  {
    year: "1969",
    event: "Neil Armstrong walks on the moon. Humanity touches the impossible.",
    emotion: "WONDER",
    scores: { grief: 10, power: 75, hope: 95, rage: 5 },
    bg: "radial-gradient(ellipse at 60% 40%, #0a1a2a 0%, #080808 70%)",
    particleColor: "#4a9fff",
    thinking: [
      "> vocal lift detected...",
      "> pitch ascending: +4 semitones",
      "> reverb expansion in mix",
      "> semantic: 'moon', 'step', 'mankind'",
      "> emotion classification: WONDER",
      "> selecting visual palette: deep blue, silver",
      "> particle behavior: floating, luminous"
    ],
    decision: "<strong>Emotion:</strong> Wonder<br><strong>Palette:</strong> Midnight blue, silver<br><strong>Particles:</strong> Floating ascent, luminous<br><strong>Typography:</strong> Expansive, light"
  },
  {
    year: "1979",
    event: "Off The Wall released. Michael Jackson redefines what music can be.",
    emotion: "JOY",
    scores: { grief: 5, power: 80, hope: 90, rage: 10 },
    bg: "radial-gradient(ellipse at 50% 60%, #1a1500 0%, #080808 70%)",
    particleColor: "#c9a84c",
    thinking: [
      "> vocal runs detected...",
      "> melisma pattern: complex",
      "> rhythm: syncopated, danceable",
      "> semantic: 'music', 'feel', 'alive'",
      "> emotion classification: JOY",
      "> selecting visual palette: gold, amber",
      "> particle behavior: dancing, rhythmic"
    ],
    decision: "<strong>Emotion:</strong> Joy<br><strong>Palette:</strong> Gold, warm amber<br><strong>Particles:</strong> Dancing, rhythmic pulse<br><strong>Typography:</strong> Fluid, celebratory"
  },
  {
    year: "1989",
    event: "Berlin Wall falls. A generation watches division crumble overnight.",
    emotion: "HOPE",
    scores: { grief: 30, power: 60, hope: 100, rage: 20 },
    bg: "radial-gradient(ellipse at 50% 30%, #0a1a0a 0%, #080808 70%)",
    particleColor: "#4aff88",
    thinking: [
      "> harmonic resolution detected...",
      "> chord: minor → major shift",
      "> breath: expansive, open",
      "> semantic: 'wall', 'free', 'together'",
      "> emotion classification: HOPE",
      "> selecting visual palette: emerald, dawn",
      "> particle behavior: rising, converging"
    ],
    decision: "<strong>Emotion:</strong> Hope<br><strong>Palette:</strong> Emerald green, dawn light<br><strong>Particles:</strong> Rising, converging upward<br><strong>Typography:</strong> Open, ascending"
  }
];

let running = false;
let currentMoment = -1;
let particleSystem = null;
let animFrame = null;

// Canvas particle system
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
let targetColor = { r: 201, g: 168, b: 76 };
let currentParticleBehavior = 'idle';

function resizeCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function createParticle(behavior, color) {
  const { r, g, b } = hexToRgb(color);
  const w = canvas.width, h = canvas.height;
  const behaviors = {
    idle: { x: Math.random()*w, y: Math.random()*h, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, life: 1, size: Math.random()*2+0.5 },
    falling: { x: Math.random()*w, y: -10, vx: (Math.random()-0.5)*0.5, vy: Math.random()*0.8+0.2, life: 1, size: Math.random()*3+1 },
    explosive: { x: w/2, y: h/2, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, size: Math.random()*3+1 },
    floating: { x: Math.random()*w, y: h+10, vx: (Math.random()-0.5)*0.4, vy: -(Math.random()*0.6+0.1), life: 1, size: Math.random()*2+0.5 },
    dancing: { x: Math.random()*w, y: Math.random()*h, vx: Math.sin(Date.now()*0.001)*2, vy: Math.cos(Date.now()*0.001)*2, life: 1, size: Math.random()*2+1 },
    rising: { x: Math.random()*w, y: h+10, vx: (Math.random()-0.5)*1, vy: -(Math.random()*1.5+0.5), life: 1, size: Math.random()*2+0.5 }
  };
  return { ...behaviors[behavior] || behaviors.idle, r, g, b, decay: Math.random()*0.003+0.002 };
}

function animateParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // spawn
  if (particles.length < 120) {
    particles.push(createParticle(currentParticleBehavior, '#' + 
      Math.floor(targetColor.r).toString(16).padStart(2,'0') +
      Math.floor(targetColor.g).toString(16).padStart(2,'0') +
      Math.floor(targetColor.b).toString(16).padStart(2,'0')
    ));
  }

  particles = particles.filter(p => p.life > 0);
  
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (currentParticleBehavior === 'dancing') {
      p.vx = Math.sin(Date.now()*0.002 + p.x)*1.5;
      p.vy = Math.cos(Date.now()*0.002 + p.y)*1.5;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.life * 0.6})`;
    ctx.fill();
  }

  animFrame = requestAnimationFrame(animateParticles);
}

animateParticles();

// AI Thinking animation
function showThinking(lines) {
  const container = document.getElementById('ai-thinking');
  container.innerHTML = '';
  
  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'ai-line';
    el.textContent = line;
    container.appendChild(el);
    
    setTimeout(() => {
      // dim previous
      container.querySelectorAll('.ai-line').forEach(l => l.classList.add('dim'));
      el.classList.remove('dim');
      el.classList.add('show', 'active');
    }, i * 280);
  });
}

function showMoment(moment) {
  // Update background
  document.getElementById('bg-layer').style.background = moment.bg;
  
  // Update particles
  targetColor = hexToRgb(moment.particleColor);
  currentParticleBehavior = ['falling','explosive','floating','dancing','rising'][MOMENTS.indexOf(moment)] || 'idle';
  particles = []; // flush

  // Update emotion
  document.getElementById('emotion-name').textContent = moment.emotion;
  document.getElementById('bar-grief').style.width = moment.scores.grief + '%';
  document.getElementById('bar-power').style.width = moment.scores.power + '%';
  document.getElementById('bar-hope').style.width = moment.scores.hope + '%';
  document.getElementById('bar-rage').style.width = moment.scores.rage + '%';

  // Show AI thinking
  showThinking(moment.thinking);

  // Show year after thinking
  setTimeout(() => {
    const yearEl = document.getElementById('year-number');
    const eventEl = document.getElementById('event-text');
    yearEl.textContent = moment.year;
    yearEl.classList.add('visible');
    setTimeout(() => {
      eventEl.textContent = moment.event;
      eventEl.classList.add('visible');
    }, 400);
  }, moment.thinking.length * 280 + 200);

  // AI decision
  setTimeout(() => {
    document.getElementById('ai-decision').innerHTML = moment.decision;
  }, moment.thinking.length * 280);

  // Add to timeline
  setTimeout(() => {
    const tl = document.getElementById('timeline');
    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.innerHTML = `
      <span class="tl-year">${moment.year}</span>
      <div class="tl-dot"></div>
      <span class="tl-event">${moment.event}</span>
    `;
    tl.appendChild(item);
    setTimeout(() => item.classList.add('show'), 50);
    tl.scrollTop = tl.scrollHeight;
  }, moment.thinking.length * 280 + 800);
}

function clearYear() {
  const yearEl = document.getElementById('year-number');
  const eventEl = document.getElementById('event-text');
  yearEl.classList.remove('visible');
  eventEl.classList.remove('visible');
}

async function runDemo() {
  if (running) return;
  running = true;
  document.getElementById('btn-start').classList.remove('active');

  for (let i = 0; i < MOMENTS.length; i++) {
    if (!running) break;
    clearYear();
    await new Promise(r => setTimeout(r, 600));
    showMoment(MOMENTS[i]);
    await new Promise(r => setTimeout(r, 6000));
  }

  running = false;
  document.getElementById('btn-start').classList.add('active');
  document.getElementById('btn-start').textContent = '▶ Replay';
}

document.getElementById('btn-start').addEventListener('click', runDemo);
document.getElementById('btn-reset').addEventListener('click', () => {
  running = false;
  clearYear();
  document.getElementById('ai-thinking').innerHTML = '';
  document.getElementById('ai-decision').textContent = 'Waiting for audio signal...';
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('emotion-name').textContent = '—';
  document.getElementById('bg-layer').style.background = '';
  ['grief','power','hope','rage'].forEach(e => document.getElementById('bar-'+e).style.width = '0%');
  document.getElementById('btn-start').textContent = '▶ Start Demo';
  document.getElementById('btn-start').classList.add('active');
  particles = [];
  currentParticleBehavior = 'idle';
});
</script>
</body>
</html>
