<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ — Concert Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Bebas Neue', sans-serif;
    cursor: none;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  #title {
    font-size: clamp(48px, 10vw, 120px);
    letter-spacing: 12px;
    color: #fff;
    opacity: 0.08;
    text-align: center;
    line-height: 1;
    transition: opacity 1s ease;
  }

  #title.playing { opacity: 0.04; }

  #subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(12px, 2vw, 18px);
    letter-spacing: 6px;
    color: #c9a84c;
    opacity: 0.4;
    margin-top: 12px;
    transition: opacity 1s ease;
  }

  #subtitle.playing { opacity: 0.15; }

  #drop-zone {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: opacity 0.5s ease;
  }

  #drop-zone.hidden { opacity: 0; pointer-events: none; }

  .drop-box {
    border: 1px solid rgba(201,168,76,0.3);
    padding: 48px 64px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(0,0,0,0.8);
  }

  .drop-box:hover {
    border-color: rgba(201,168,76,0.8);
    background: rgba(201,168,76,0.05);
  }

  .drop-box.dragover {
    border-color: #c9a84c;
    background: rgba(201,168,76,0.1);
  }

  .drop-title {
    font-size: 32px;
    letter-spacing: 6px;
    color: #c9a84c;
    margin-bottom: 8px;
  }

  .drop-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 3px;
  }

  #file-input { display: none; }

  #controls {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    display: flex;
    gap: 16px;
    align-items: center;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }

  #controls.visible {
    opacity: 1;
    pointer-events: all;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 10px 28px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .ctrl-btn:hover {
    background: #c9a84c;
    color: #000;
    border-color: #c9a84c;
  }

  #track-name {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(201,168,76,0.6);
  }

  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #c9a84c;
    width: 0%;
    z-index: 30;
    transition: width 0.1s linear;
    box-shadow: 0 0 8px #c9a84c;
  }

  #spotlight {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 5;
    transform: translate(-50%, -50%);
    transition: left 0.1s ease, top 0.1s ease;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="spotlight"></div>

<div id="overlay">
  <div id="title">BILLIE JEAN</div>
  <div id="subtitle">Michael Jackson — Thriller</div>
</div>

<div id="drop-zone">
  <div class="drop-box" id="drop-box">
    <div class="drop-title">DROP MP3</div>
    <div class="drop-sub">or click to select your file</div>
  </div>
  <input type="file" id="file-input" accept="audio/*">
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-play">PAUSE</button>
  <span id="track-name">—</span>
  <button class="ctrl-btn" id="btn-reset">✕</button>
</div>

<div id="progress-bar" id="progress"></div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

// Fallback to 2D if WebGL unavailable
const use2D = !gl;
const ctx2d = use2D ? canvas.getContext('2d') : null;

let audioCtx, analyser, source, audioBuffer;
let freqData, timeData;
let isPlaying = false;
let startTime = 0, pauseOffset = 0;
let animId;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// Mouse spotlight
document.addEventListener('mousemove', e => {
  const s = document.getElementById('spotlight');
  s.style.left = e.clientX + 'px';
  s.style.top = e.clientY + 'px';
});

// Audio setup
async function setupAudio(arrayBuffer) {
  if (audioCtx) audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.frequencyBinCount);
  
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  playFrom(0);
}

function playFrom(offset) {
  if (source) { try { source.stop(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  source.start(0, offset);
  startTime = audioCtx.currentTime - offset;
  pauseOffset = 0;
  isPlaying = true;
  source.onended = () => { if (isPlaying) isPlaying = false; };
}

function togglePlay() {
  if (!audioCtx) return;
  if (isPlaying) {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop();
    isPlaying = false;
    document.getElementById('btn-play').textContent = 'PLAY';
  } else {
    playFrom(pauseOffset);
    document.getElementById('btn-play').textContent = 'PAUSE';
  }
}

// File handling
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    setupAudio(e.target.result);
    document.getElementById('drop-zone').classList.add('hidden');
    document.getElementById('controls').classList.add('visible');
    document.getElementById('track-name').textContent = file.name.replace(/\.[^.]+$/, '').toUpperCase();
    document.getElementById('title').classList.add('playing');
    document.getElementById('subtitle').classList.add('playing');
  };
  reader.readAsArrayBuffer(file);
}

const dropBox = document.getElementById('drop-box');
dropBox.addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });
document.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('dragover'); });
document.addEventListener('dragleave', () => dropBox.classList.remove('dragover'));
document.addEventListener('drop', e => {
  e.preventDefault();
  dropBox.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-reset').addEventListener('click', () => {
  if (source) try { source.stop(); } catch(e){}
  isPlaying = false;
  audioCtx = null;
  document.getElementById('drop-zone').classList.remove('hidden');
  document.getElementById('controls').classList.remove('visible');
  document.getElementById('title').classList.remove('playing');
  document.getElementById('subtitle').classList.remove('playing');
  document.getElementById('progress-bar').style.width = '0%';
});

// ============ VISUALIZER ============
// We use 2D canvas with concert-grade effects

let hue = 0;
let beatEnergy = 0;
let prevEnergy = 0;
let beatPulse = 0;
const particles = [];
const PARTICLE_COUNT = 180;

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    size: Math.random() * 2 + 0.5,
    hue: Math.random() * 40 + 20,
    life: Math.random()
  });
}

// Use 2D context for all rendering (WebGL overkill for this demo)
const c = canvas.getContext('2d');

function getEnergy(data, lo, hi) {
  let sum = 0;
  for (let i = lo; i < hi; i++) sum += data[i];
  return sum / (hi - lo) / 255;
}

function draw() {
  animId = requestAnimationFrame(draw);
  const w = canvas.width, h = canvas.height;

  if (!analyser) {
    // idle animation
    c.fillStyle = 'rgba(0,0,0,0.15)';
    c.fillRect(0, 0, w, h);
    drawIdleParticles(w, h);
    return;
  }

  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const bass = getEnergy(freqData, 0, 10);
  const mid = getEnergy(freqData, 10, 80);
  const high = getEnergy(freqData, 80, 200);
  const energy = bass * 0.6 + mid * 0.3 + high * 0.1;

  // Beat detection
  const isBeat = energy > prevEnergy * 1.3 && energy > 0.15;
  if (isBeat) beatPulse = 1;
  beatPulse *= 0.92;
  prevEnergy = energy * 0.8 + prevEnergy * 0.2;

  // Background — deep dark with subtle color
  c.fillStyle = `rgba(0,0,0,${0.25 + bass * 0.1})`;
  c.fillRect(0, 0, w, h);

  // ---- FLOOR REFLECTION ----
  const floorY = h * 0.72;
  const barCount = 128;
  const barW = w / barCount;

  for (let i = 0; i < barCount; i++) {
    const val = freqData[Math.floor(i * freqData.length / barCount)] / 255;
    const barH = val * h * 0.45;
    const x = i * barW;
    const hueShift = (i / barCount) * 60 + hue;
    const sat = 60 + val * 40;
    const lit = 30 + val * 40;

    // Main bar
    const grad = c.createLinearGradient(x, floorY, x, floorY - barH);
    grad.addColorStop(0, `hsla(${hueShift}, ${sat}%, ${lit}%, 0.9)`);
    grad.addColorStop(0.6, `hsla(${hueShift + 20}, ${sat}%, ${lit + 20}%, 0.6)`);
    grad.addColorStop(1, `hsla(${hueShift + 40}, 100%, 85%, 0.0)`);
    c.fillStyle = grad;
    c.fillRect(x, floorY - barH, barW - 1, barH);

    // Mirror reflection
    const reflGrad = c.createLinearGradient(x, floorY, x, floorY + barH * 0.4);
    reflGrad.addColorStop(0, `hsla(${hueShift}, ${sat}%, ${lit}%, 0.3)`);
    reflGrad.addColorStop(1, `hsla(${hueShift}, ${sat}%, ${lit}%, 0)`);
    c.fillStyle = reflGrad;
    c.fillRect(x, floorY, barW - 1, barH * 0.4);
  }

  // Floor line
  c.strokeStyle = `rgba(201,168,76,${0.1 + bass * 0.3})`;
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(0, floorY);
  c.lineTo(w, floorY);
  c.stroke();

  // ---- WAVEFORM ----
  c.beginPath();
  c.lineWidth = 1.5;
  c.strokeStyle = `rgba(255,255,255,${0.08 + mid * 0.15})`;
  for (let i = 0; i < timeData.length; i++) {
    const x = (i / timeData.length) * w;
    const y = floorY - 60 + ((timeData[i] / 128) - 1) * 40;
    i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  }
  c.stroke();

  // ---- SPOTLIGHT BEAMS ----
  const beamCount = 6;
  for (let b = 0; b < beamCount; b++) {
    const angle = (b / beamCount) * Math.PI + Math.sin(Date.now() * 0.0003 + b) * 0.3;
    const intensity = (freqData[b * 15] / 255) * 0.12 + 0.02;
    const bx = w * 0.1 + (b / beamCount) * w * 0.8;

    const grad = c.createConicalGradient
      ? null
      : (() => {
          const g = c.createLinearGradient(bx, 0, bx + Math.cos(angle) * h, h);
          g.addColorStop(0, `rgba(255,240,200,${intensity})`);
          g.addColorStop(1, `rgba(255,240,200,0)`);
          return g;
        })();

    c.save();
    c.translate(bx, 0);
    c.rotate(angle - Math.PI / 2);
    const beamGrad = c.createLinearGradient(0, 0, 0, h * 0.8);
    beamGrad.addColorStop(0, `rgba(255,240,180,${intensity * 2})`);
    beamGrad.addColorStop(0.3, `rgba(255,240,180,${intensity})`);
    beamGrad.addColorStop(1, `rgba(255,240,180,0)`);
    c.fillStyle = beamGrad;
    c.beginPath();
    c.moveTo(0, 0);
    c.lineTo(-20 - bass * 40, h * 0.8);
    c.lineTo(20 + bass * 40, h * 0.8);
    c.closePath();
    c.fill();
    c.restore();
  }

  // ---- BEAT PULSE RING ----
  if (beatPulse > 0.1) {
    c.beginPath();
    c.arc(w / 2, floorY, beatPulse * w * 0.4, 0, Math.PI * 2);
    c.strokeStyle = `rgba(201,168,76,${beatPulse * 0.4})`;
    c.lineWidth = beatPulse * 3;
    c.stroke();
  }

  // ---- PARTICLES ----
  for (const p of particles) {
    p.x += p.vx * (1 + energy * 3);
    p.y += p.vy * (1 + energy * 3);
    if (p.x < 0) p.x = w;
    if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h;
    if (p.y > h) p.y = 0;

    const brightness = 40 + energy * 60;
    c.beginPath();
    c.arc(p.x, p.y, p.size * (1 + bass * 2), 0, Math.PI * 2);
    c.fillStyle = `hsla(${p.hue + hue},80%,${brightness}%,${0.3 + energy * 0.5})`;
    c.fill();
  }

  // ---- CENTER GLOW ----
  const glowR = 80 + energy * 200 + beatPulse * 150;
  const glow = c.createRadialGradient(w/2, floorY, 0, w/2, floorY, glowR);
  glow.addColorStop(0, `rgba(201,168,76,${0.08 + energy * 0.15})`);
  glow.addColorStop(1, 'rgba(201,168,76,0)');
  c.fillStyle = glow;
  c.fillRect(0, 0, w, h);

  hue = (hue + 0.08) % 360;

  // Progress
  if (isPlaying && audioBuffer) {
    const elapsed = audioCtx.currentTime - startTime;
    const pct = Math.min(elapsed / audioBuffer.duration * 100, 100);
    document.getElementById('progress-bar').style.width = pct + '%';
  }
}

function drawIdleParticles(w, h) {
  hue = (hue + 0.05) % 360;
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = w;
    if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h;
    if (p.y > h) p.y = 0;
    c.beginPath();
    c.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    c.fillStyle = `hsla(${p.hue + hue},60%,50%,0.15)`;
    c.fill();
  }
}

draw();
</script>
</body>
</html>
